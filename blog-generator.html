<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Generator — VortexLabs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628; --navy-mid: #112040; --navy-light: #1a3060;
      --blue: #2563eb; --blue-bright: #3b82f6; --blue-glow: rgba(37,99,235,0.15);
      --white: #fff; --off: #d4dff5; --muted: #8aa0c4;
      --border: rgba(255,255,255,0.08); --success: #22c55e;
      --warning: #f59e0b; --danger: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; }

    /* HEADER */
    header {
      padding: 14px 24px; border-bottom: 1px solid var(--border);
      background: rgba(10,22,40,0.98); position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .logo { font-size: 14px; font-weight: 700; margin-right: 8px; white-space: nowrap; }
    .logo span { color: var(--blue-bright); }
    .hdr-field {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--white); outline: none; transition: border-color 0.15s;
    }
    .hdr-field:focus { border-color: var(--blue); }
    .hdr-field::placeholder { color: var(--muted); }
    .hdr-field.wide { width: 220px; }
    .hdr-field.narrow { width: 160px; }
    .btn-sm {
      padding: 7px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      background: var(--navy-light); color: var(--white); transition: all 0.15s; white-space: nowrap;
    }
    .btn-sm:hover { background: var(--blue); border-color: var(--blue); }
    .btn-sm.active { background: var(--blue); border-color: var(--blue); }
    .tag {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px;
    }
    .tag.saved { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    .tag.missing { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .hdr-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    /* LAYOUT */
    .app { display: flex; height: calc(100vh - 53px); }

    /* SIDEBAR */
    .sidebar {
      width: 340px; flex-shrink: 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .stab {
      flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'DM Sans', sans-serif;
    }
    .stab.active { color: var(--white); border-bottom-color: var(--blue); }

    /* TOPICS PANEL */
    .topics-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .topic-search-bar {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .topic-input {
      flex: 1; background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--white); outline: none;
    }
    .topic-input:focus { border-color: var(--blue); }
    .topic-input::placeholder { color: var(--muted); }
    .btn-fetch {
      background: var(--blue); border: none; color: var(--white);
      padding: 8px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .btn-fetch:hover { background: var(--blue-bright); }
    .btn-fetch:disabled { opacity: 0.45; cursor: not-allowed; }
    .topics-list { flex: 1; overflow-y: auto; padding: 10px; }
    .topic-item {
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 9px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .topic-item:hover { border-color: rgba(59,130,246,0.35); }
    .topic-item.active { border-color: var(--blue); background: var(--blue-glow); }
    .topic-item-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
    .topic-item-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
    .fw-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--blue-bright);
      background: var(--blue-glow); border: 1px solid rgba(59,130,246,0.2);
      padding: 2px 7px; border-radius: 4px;
    }
    .topic-actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn-write {
      background: var(--blue); border: none; color: var(--white);
      padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-write:hover { background: var(--blue-bright); }
    .btn-write:disabled { opacity: 0.45; cursor: not-allowed; }

    /* SYSTEM PROMPT PANEL */
    .prompt-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; padding: 14px; gap: 10px; }
    .prompt-panel.visible { display: flex; }
    .prompt-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .prompt-textarea {
      flex: 1; background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--off); line-height: 1.6; resize: none;
      outline: none; transition: border-color 0.15s;
    }
    .prompt-textarea:focus { border-color: var(--blue); }
    .prompt-actions { display: flex; gap: 8px; }
    .btn-save-prompt {
      background: var(--blue); border: none; color: var(--white);
      padding: 8px 18px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-save-prompt:hover { background: var(--blue-bright); }
    .btn-reset-prompt {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .btn-reset-prompt:hover { border-color: var(--muted); color: var(--white); }

    /* MAIN EDITOR */
    .editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .editor-title { font-size: 14px; font-weight: 600; color: var(--muted); }
    .editor-title.active { color: var(--white); }
    .editor-actions { display: flex; gap: 8px; }
    .btn-publish {
      background: var(--success); border: none; color: var(--white);
      padding: 8px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-publish:hover { opacity: 0.85; }
    .btn-publish:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-dl {
      background: var(--navy-light); border: 1px solid var(--border); color: var(--white);
      padding: 8px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-dl:hover { background: var(--blue); border-color: var(--blue); }
    .btn-dl:disabled { opacity: 0.4; cursor: not-allowed; }

    .editor-body { flex: 1; overflow-y: auto; }

    /* EMPTY STATE */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--muted);
    }
    .empty-icon { font-size: 40px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* GENERATING STATE */
    .gen-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gen-label { font-size: 14px; color: var(--muted); }

    /* PREVIEW */
    .preview-wrap { padding: 32px 40px; max-width: 820px; margin: 0 auto; }
    .preview-wrap h1 { font-size: 28px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; margin-bottom: 20px; line-height: 1.25; }
    .preview-wrap h2 { font-size: 20px; font-weight: 700; color: var(--white); margin: 32px 0 10px; letter-spacing: -0.3px; }
    .preview-wrap h3 { font-size: 16px; font-weight: 600; color: var(--white); margin: 20px 0 8px; }
    .preview-wrap p { font-size: 15px; color: var(--off); line-height: 1.75; margin-bottom: 16px; }
    .preview-wrap ul, .preview-wrap ol { margin: 0 0 16px 20px; }
    .preview-wrap li { font-size: 15px; color: var(--off); line-height: 1.7; margin-bottom: 6px; }
    .preview-wrap strong { color: var(--white); }
    .preview-cta {
      background: var(--navy-mid); border: 1px solid rgba(59,130,246,0.25);
      border-radius: 14px; padding: 36px; text-align: center; margin-top: 40px;
    }
    .preview-cta h2 { font-size: 22px; margin-bottom: 8px; }
    .preview-cta p { margin-bottom: 20px; }
    .preview-cta a {
      display: inline-block; background: var(--blue); color: var(--white);
      padding: 13px 28px; border-radius: 9px; font-weight: 700;
      text-decoration: none; font-size: 14px;
    }
    .preview-cta a:hover { background: var(--blue-bright); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--navy-mid); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transform: translateY(8px); transition: all 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.35); color: var(--success); }
    .toast.error { border-color: rgba(239,68,68,0.35); color: var(--danger); }
    .toast.info { border-color: rgba(59,130,246,0.35); color: var(--blue-bright); }

    /* SCROLLBARS */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 4px; }

    @media (max-width: 700px) {
      .sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      .app { flex-direction: column; height: auto; }
      .editor { height: 55vh; }
      .hdr-field.wide { width: 140px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Vortex<span>Labs</span> Blog Generator</div>
  <div class="hdr-sep"></div>
  <input type="password" class="hdr-field narrow" id="openaiKey" placeholder="OpenAI key (sk-...)" />
  <input type="password" class="hdr-field narrow" id="githubPat" placeholder="GitHub PAT" />
  <button class="btn-sm" onclick="saveKeys()">Save Keys</button>
  <span class="tag missing" id="keyStatus">No keys</span>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" id="tabTopics" onclick="switchTab('topics')">Topics</button>
      <button class="stab" id="tabPrompt" onclick="switchTab('prompt')">System Prompt</button>
    </div>

    <!-- TOPICS PANEL -->
    <div class="topics-panel" id="topicsPanel">
      <div class="topic-search-bar">
        <input type="text" class="topic-input" id="customInput" placeholder="Custom topic (optional)..." />
        <button class="btn-fetch" id="fetchBtn" onclick="fetchTopics()">Fetch</button>
      </div>
      <div class="topics-list" id="topicsList">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- SYSTEM PROMPT PANEL -->
    <div class="prompt-panel" id="promptPanel">
      <div class="prompt-label">Writing Rules / System Prompt</div>
      <textarea class="prompt-textarea" id="systemPrompt"></textarea>
      <div class="prompt-actions">
        <button class="btn-save-prompt" onclick="savePrompt()">Save</button>
        <button class="btn-reset-prompt" onclick="resetPrompt()">Reset to default</button>
      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor">
    <div class="editor-toolbar">
      <div class="editor-title" id="editorTitle">Select a topic to write</div>
      <div class="editor-actions">
        <button class="btn-dl" id="dlBtn" onclick="downloadCurrent()" disabled>Download</button>
        <button class="btn-publish" id="publishBtn" onclick="publishToGitHub()" disabled>Publish to GitHub</button>
      </div>
    </div>
    <div class="editor-body" id="editorBody">
      <div class="empty-state">
        <div class="empty-icon">✍️</div>
        <p>Pick a topic from the left and click Write</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// CONFIG
const LANDING_PAGE = "https://vortexlabs.app/meta-dashboard-free-download.html";
const GH_USER = "vaswinraaju-png";
const GH_REPO = "vortex_labs";
const GH_BRANCH = "main";
const GH_FOLDER = "blogs";

// STATE
let currentPost = null; // { topic, html, slug }
let topics = [];

const DEFAULT_PROMPT = `You are an expert performance marketing copywriter for VortexLabs.

Rules you must always follow:
- Write for performance marketers, media buyers, agencies, and small business owners running Meta/Facebook Ads
- Use PAS (Problem-Agitate-Solution), AIDA (Attention-Interest-Desire-Action), or BAB (Before-After-Bridge) frameworks
- Open with a powerful hook: a bold stat, a direct pain point, or a confrontational question
- 900 to 1200 words per post
- Use H2 and H3 subheadings to break up content
- Include 2 to 3 specific, realistic scenarios or examples
- End with a CTA block driving urgency, trust, or motivation to visit the Meta Ads Dashboard
- Never use em dashes anywhere
- Never use filler phrases like "In today's digital landscape", "In conclusion", or "It's no secret"
- Write in plain, direct, conversational English
- No fluff, no padding, no corporate tone
- Every post must feel like it was written by someone who actually runs Meta Ads campaigns daily`;

// INIT
window.onload = () => {
  const ok = localStorage.getItem('vl_openai');
  const gk = localStorage.getItem('vl_github');
  if (ok) document.getElementById('openaiKey').value = ok;
  if (gk) document.getElementById('githubPat').value = gk;
  updateKeyStatus();

  const saved = localStorage.getItem('vl_system_prompt');
  document.getElementById('systemPrompt').value = saved || DEFAULT_PROMPT;

  loadDefaultTopics();
};

function saveKeys() {
  const ok = document.getElementById('openaiKey').value.trim();
  const gk = document.getElementById('githubPat').value.trim();
  if (ok) localStorage.setItem('vl_openai', ok);
  if (gk) localStorage.setItem('vl_github', gk);
  updateKeyStatus();
  toast('Keys saved', 'success');
}

function updateKeyStatus() {
  const ok = localStorage.getItem('vl_openai');
  const gk = localStorage.getItem('vl_github');
  const el = document.getElementById('keyStatus');
  if (ok && gk) { el.textContent = 'Keys saved'; el.className = 'tag saved'; }
  else if (ok) { el.textContent = 'GitHub PAT missing'; el.className = 'tag missing'; }
  else { el.textContent = 'No keys'; el.className = 'tag missing'; }
}

function savePrompt() {
  localStorage.setItem('vl_system_prompt', document.getElementById('systemPrompt').value);
  toast('System prompt saved', 'success');
}

function resetPrompt() {
  document.getElementById('systemPrompt').value = DEFAULT_PROMPT;
  localStorage.setItem('vl_system_prompt', DEFAULT_PROMPT);
  toast('Reset to default', 'info');
}

function switchTab(tab) {
  document.getElementById('tabTopics').classList.toggle('active', tab === 'topics');
  document.getElementById('tabPrompt').classList.toggle('active', tab === 'prompt');
  document.getElementById('topicsPanel').style.display = tab === 'topics' ? 'flex' : 'none';
  document.getElementById('promptPanel').classList.toggle('visible', tab === 'prompt');
  document.getElementById('promptPanel').style.display = tab === 'prompt' ? 'flex' : 'none';
}

// DEFAULT TOPICS
const SEED_TOPICS = [
  { slug: "meta-ads-reporting-without-spreadsheets", title: "Why Meta Ads Reporting in Spreadsheets Is Killing Your Productivity", framework: "PAS", angle: "Urgency" },
  { slug: "roas-dropping-meta-ads", title: "Your ROAS Is Dropping and You're the Last to Know It", framework: "PAS", angle: "Fear" },
  { slug: "meta-ads-dashboard-freelancers", title: "The One Tool Every Freelance Media Buyer Needs in 2025", framework: "AIDA", angle: "Trust" },
  { slug: "client-reporting-meta-ads", title: "How to Send Meta Ads Reports Clients Actually Understand", framework: "BAB", angle: "Trust" },
  { slug: "reduce-cpl-meta-ads", title: "5 Reasons Your CPL Is High (And How to Fix It Fast)", framework: "PAS", angle: "Motivation" },
  { slug: "meta-ads-mistakes-agencies", title: "The Meta Ads Mistakes Most Agencies Make Every Single Month", framework: "PAS", angle: "Fear" },
  { slug: "facebook-ads-small-business", title: "Facebook Ads for Small Business Owners Who Don't Have Time to Waste", framework: "BAB", angle: "Empathy" },
  { slug: "meta-ads-creative-fatigue", title: "Creative Fatigue Is Draining Your Budget. Here's the Fix.", framework: "PAS", angle: "Urgency" },
  { slug: "scale-meta-ads-campaigns", title: "How to Scale Meta Ads Without Watching Everything Break", framework: "AIDA", angle: "Motivation" },
  { slug: "meta-ads-account-audit", title: "Run a Meta Ads Account Audit in Under 30 Minutes", framework: "BAB", angle: "Trust" },
  { slug: "media-buyer-productivity", title: "How Top Media Buyers Manage 10 Ad Accounts Without Burning Out", framework: "AIDA", angle: "Aspiration" },
  { slug: "meta-ads-reporting-tools-cost", title: "Why Are You Paying $50 a Month Just to See Your Own Ad Data?", framework: "PAS", angle: "Anger" },
  { slug: "facebook-ads-metrics-that-matter", title: "The Only 5 Meta Ads Metrics That Actually Matter", framework: "AIDA", angle: "Trust" },
  { slug: "meta-ads-founders-report", title: "What Your Founder Wants to See in Your Meta Ads Report", framework: "BAB", angle: "Trust" },
  { slug: "ad-spend-wastage-meta", title: "You're Wasting 30% of Your Ad Spend. Here's the Proof.", framework: "PAS", angle: "Fear" },
  { slug: "meta-ads-weekly-review", title: "The 15-Minute Weekly Meta Ads Review That Saves Thousands", framework: "BAB", angle: "Motivation" },
  { slug: "multi-account-meta-ads", title: "Managing Multiple Meta Ad Accounts? You Need a System.", framework: "PAS", angle: "Empathy" },
  { slug: "meta-ads-dashboard-vs-ads-manager", title: "Meta Ads Manager vs a Proper Dashboard: What's the Difference?", framework: "AIDA", angle: "Trust" },
  { slug: "performance-marketing-reporting-2025", title: "Performance Marketing Reporting in 2025: What's Changed", framework: "AIDA", angle: "Authority" },
  { slug: "meta-ads-ecommerce-losses", title: "Why eCommerce Brands Lose Money on Meta Ads (And How to Stop)", framework: "BAB", angle: "Fear" },
];

function loadDefaultTopics() {
  topics = [...SEED_TOPICS];
  renderTopics();
}

function renderTopics() {
  const list = document.getElementById('topicsList');
  if (!topics.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No topics. Click Fetch to generate.</div>`;
    return;
  }
  list.innerHTML = topics.map((t, i) => `
    <div class="topic-item" id="ti-${i}">
      <div class="topic-item-title">${t.title}</div>
      <div class="topic-item-meta">
        <span class="fw-tag">${t.framework}</span>
        <span>${t.angle}</span>
      </div>
      <div class="topic-actions">
        <button class="btn-write" onclick="writeTopic(${i})">Write</button>
      </div>
    </div>
  `).join('');
}

// FETCH TOPICS from OpenAI
async function fetchTopics() {
  const key = localStorage.getItem('vl_openai');
  if (!key) { toast('Save your OpenAI key first', 'error'); return; }

  const custom = document.getElementById('customInput').value.trim();
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = 'Fetching...';

  const prompt = custom
    ? `Generate 8 SEO blog post topic ideas about: "${custom}". Each should target performance marketers, media buyers, or agencies running Meta/Facebook Ads. Return JSON array only. No markdown. Format: [{"slug":"url-friendly-slug","title":"Blog Post Title","framework":"PAS or AIDA or BAB","angle":"Urgency or Trust or Motivation or Fear or Empathy"}]`
    : `Generate 20 diverse SEO blog post topic ideas for performance marketers, media buyers, agencies, and small business owners running Meta/Facebook Ads. Mix frameworks and angles. Return JSON array only. No markdown. Format: [{"slug":"url-friendly-slug","title":"Blog Post Title","framework":"PAS or AIDA or BAB","angle":"Urgency or Trust or Motivation or Fear or Empathy"}]`;

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 1500, temperature: 0.9,
        messages: [
          { role: 'system', content: 'You are a performance marketing SEO strategist. Return only valid JSON arrays.' },
          { role: 'user', content: prompt }
        ]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    const text = data.choices[0].message.content.replace(/```json|```/g, '').trim();
    const fetched = JSON.parse(text);
    topics = fetched;
    renderTopics();
    toast(`${fetched.length} topics fetched`, 'success');
  } catch(e) {
    toast('Fetch failed: ' + e.message, 'error');
  }

  btn.disabled = false; btn.textContent = 'Fetch';
}

// WRITE TOPIC
async function writeTopic(idx) {
  const key = localStorage.getItem('vl_openai');
  if (!key) { toast('Save your OpenAI key first', 'error'); return; }

  const topic = topics[idx];
  const sysPrompt = document.getElementById('systemPrompt').value;

  // Mark active
  document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`ti-${idx}`)?.classList.add('active');

  // Disable write btn
  const btn = document.querySelector(`#ti-${idx} .btn-write`);
  if (btn) { btn.disabled = true; btn.textContent = 'Writing...'; }

  // Show generating state
  document.getElementById('editorTitle').textContent = topic.title;
  document.getElementById('editorTitle').className = 'editor-title active';
  document.getElementById('editorBody').innerHTML = `
    <div class="gen-state">
      <div class="spinner"></div>
      <div class="gen-label">Writing "${topic.title}"...</div>
    </div>`;
  document.getElementById('dlBtn').disabled = true;
  document.getElementById('publishBtn').disabled = true;

  try {
    const userPrompt = `Write a complete SEO blog post using the ${topic.framework} framework.

Title: "${topic.title}"
Conversion goal: ${topic.angle}
Target reader: Performance marketers, media buyers, agencies, small business owners running Meta/Facebook Ads

Requirements:
- 900 to 1200 words
- Use ${topic.framework} framework throughout the structure
- Strong hook in the opening paragraph
- H2 and H3 subheadings throughout
- 2 to 3 specific realistic examples or scenarios
- End with a persuasive CTA referencing: ${LANDING_PAGE}
- No em dashes anywhere
- Body content only, use ## for H2 and ### for H3`;

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'gpt-4o', max_tokens: 3000, temperature: 0.8,
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user', content: userPrompt }
        ]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    const content = data.choices[0].message.content;
    const html = wrapInHTML(topic, content);

    currentPost = { topic, html, slug: topic.slug };

    // Render preview
    document.getElementById('editorBody').innerHTML = `<div class="preview-wrap">${buildPreview(topic, content)}</div>`;
    document.getElementById('dlBtn').disabled = false;
    document.getElementById('publishBtn').disabled = false;
    toast('Post written', 'success');

  } catch(e) {
    document.getElementById('editorBody').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
    toast('Write failed: ' + e.message, 'error');
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Write'; }
}

// MARKDOWN TO HTML
function markdownToHTML(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .split('\n')
    .map(line => {
      line = line.trim();
      if (!line) return '';
      if (/^<(h[23]|ul|li)/.test(line)) return line;
      return `<p>${line}</p>`;
    })
    .filter(Boolean)
    .join('\n');
}

// DOWNLOAD
function downloadCurrent() {
  if (!currentPost) return;
  const blob = new Blob([currentPost.html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentPost.slug}.html`;
  a.click();
}

// PUBLISH TO GITHUB
async function publishToGitHub() {
  const pat = localStorage.getItem('vl_github');
  if (!pat) { toast('Save your GitHub PAT first', 'error'); return; }
  if (!currentPost) return;

  const btn = document.getElementById('publishBtn');
  btn.disabled = true; btn.textContent = 'Publishing...';

  const path = `${GH_FOLDER}/${currentPost.slug}.html`;
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${path}`;
  const content = btoa(unescape(encodeURIComponent(currentPost.html)));

  try {
    // Check if file exists (get SHA)
    let sha = null;
    const check = await fetch(url, {
      headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
    });
    if (check.ok) {
      const existing = await check.json();
      sha = existing.sha;
    }

    const body = {
      message: `Add blog post: ${currentPost.topic.title}`,
      content,
      branch: GH_BRANCH,
      ...(sha ? { sha } : {})
    };

    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${pat}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'GitHub API error');
    }

    toast(`Published to blogs/${currentPost.slug}.html`, 'success');

  } catch(e) {
    toast('Publish failed: ' + e.message, 'error');
  }

  btn.disabled = false; btn.textContent = 'Publish to GitHub';
}

// TOAST
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3000);
}
