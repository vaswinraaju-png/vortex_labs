<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Generator — VortexLabs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#0a1628;--navy-mid:#112040;--navy-light:#1a3060;--blue:#2563eb;--blue-bright:#3b82f6;--blue-glow:rgba(37,99,235,0.15);--white:#fff;--off:#d4dff5;--muted:#8aa0c4;--border:rgba(255,255,255,0.08);--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
    header{padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(10,22,40,0.98);position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .logo{font-size:14px;font-weight:700;margin-right:4px;white-space:nowrap;}
    .logo span{color:var(--blue-bright);}
    .hdr-field{background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;}
    .hdr-field:focus{border-color:var(--blue);}
    .hdr-field::placeholder{color:var(--muted);}
    .hdr-field.w200{width:200px;}.hdr-field.w150{width:150px;}
    .btn-sm{padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--navy-light);color:var(--white);transition:all 0.15s;white-space:nowrap;}
    .btn-sm:hover{background:var(--blue);border-color:var(--blue);}
    .tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
    .tag.saved{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.25);}
    .tag.missing{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
    .hdr-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
    .app{display:flex;height:calc(100vh - 53px);}
    .sidebar{width:320px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);}
    .stab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
    .stab.active{color:var(--white);border-bottom-color:var(--blue);}
    .topics-panel{display:flex;flex-direction:column;flex:1;overflow:hidden;}
    .topic-search-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:center;}
    .topic-input{flex:1;background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;}
    .topic-input:focus{border-color:var(--blue);}
    .topic-input::placeholder{color:var(--muted);}
    .btn-fetch{background:var(--blue);border:none;color:var(--white);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .btn-fetch:hover{background:var(--blue-bright);}
    .btn-fetch:disabled{opacity:0.4;cursor:not-allowed;}
    .topics-list{flex:1;overflow-y:auto;padding:8px;}
    .topic-item{background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s;}
    .topic-item:hover{border-color:rgba(59,130,246,0.35);}
    .topic-item.active{border-color:var(--blue);background:var(--blue-glow);}
    .topic-item-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:5px;}
    .topic-item-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .fw-tag{font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--blue-bright);background:var(--blue-glow);border:1px solid rgba(59,130,246,0.2);padding:2px 6px;border-radius:4px;}
    .topic-actions{display:flex;gap:6px;margin-top:8px;}
    .btn-write{background:var(--blue);border:none;color:var(--white);padding:5px 13px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-write:hover{background:var(--blue-bright);}
    .btn-write:disabled{opacity:0.4;cursor:not-allowed;}
    .prompt-panel{display:none;flex-direction:column;flex:1;overflow:hidden;padding:12px;gap:8px;}
    .prompt-panel.visible{display:flex;}
    .prompt-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;}
    .prompt-textarea{flex:1;background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--off);line-height:1.6;resize:none;outline:none;}
    .prompt-textarea:focus{border-color:var(--blue);}
    .prompt-actions{display:flex;gap:7px;}
    .btn-save-prompt{background:var(--blue);border:none;color:var(--white);padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-reset-prompt{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
    .btn-reset-prompt:hover{border-color:var(--muted);color:var(--white);}
    .seo-panel{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:12px;gap:8px;}
    .seo-panel.visible{display:flex;}
    .seo-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;margin-top:6px;padding:0 2px;}
    .seo-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;}
    .seo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .seo-dot.pass{background:var(--success);}
    .seo-dot.warn{background:var(--warning);}
    .seo-dot.fail{background:var(--danger);}
    .seo-dot.na{background:transparent;}
    .seo-item-label{font-size:12px;font-weight:600;margin-bottom:2px;}
    .seo-item-val{font-size:11px;color:var(--muted);line-height:1.4;}
    .seo-score-bar{background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
    .seo-score-num{font-size:28px;font-weight:700;}
    .seo-score-num.good{color:var(--success);}
    .seo-score-num.ok{color:var(--warning);}
    .seo-score-num.bad{color:var(--danger);}
    .seo-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}
    .editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .editor-toolbar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    .editor-title{font-size:13px;font-weight:600;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .editor-title.active{color:var(--white);}
    .editor-tabs{display:flex;gap:5px;}
    .etab{padding:5px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);}
    .etab.active{background:var(--navy-light);color:var(--white);border-color:var(--navy-light);}
    .editor-actions{display:flex;gap:7px;}
    .btn-dl{background:var(--navy-light);border:1px solid var(--border);color:var(--white);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .btn-dl:hover{background:var(--blue);border-color:var(--blue);}
    .btn-dl:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-publish{background:var(--success);border:none;color:var(--white);padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-publish:hover{opacity:0.85;}
    .btn-publish:disabled{opacity:0.4;cursor:not-allowed;}
    .editor-body{flex:1;overflow-y:auto;}
    .preview-wrap{padding:28px 36px;max-width:800px;margin:0 auto;}
    .preview-wrap h1{font-size:26px;font-weight:700;color:var(--white);letter-spacing:-0.5px;margin-bottom:18px;line-height:1.25;}
    .preview-wrap h2{font-size:19px;font-weight:700;color:var(--white);margin:30px 0 9px;}
    .preview-wrap h3{font-size:15px;font-weight:600;color:var(--white);margin:18px 0 7px;}
    .preview-wrap p{font-size:14px;color:var(--off);line-height:1.75;margin-bottom:14px;}
    .preview-wrap ul,.preview-wrap ol{margin:0 0 14px 18px;}
    .preview-wrap li{font-size:14px;color:var(--off);line-height:1.7;margin-bottom:5px;}
    .preview-wrap strong{color:var(--white);}
    .preview-cta{background:var(--navy-mid);border:1px solid rgba(59,130,246,0.25);border-radius:14px;padding:32px;text-align:center;margin-top:36px;}
    .preview-cta h2{font-size:20px;color:var(--white);margin-bottom:8px;font-weight:700;}
    .preview-cta p{margin-bottom:18px;color:var(--muted);font-size:14px;}
    .preview-cta a{display:inline-block;background:var(--blue);color:var(--white);padding:12px 26px;border-radius:9px;font-weight:700;text-decoration:none;font-size:14px;}
    .source-wrap{padding:14px;height:100%;}
    .source-pre{background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:var(--off);line-height:1.6;overflow:auto;height:calc(100% - 28px);white-space:pre-wrap;word-break:break-all;}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);}
    .empty-icon{font-size:36px;opacity:0.4;}
    .empty-state p{font-size:13px;}
    .gen-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .gen-label{font-size:13px;color:var(--muted);}
    .toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transform:translateY(6px);transition:all 0.2s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.success{border-color:rgba(34,197,94,0.35);color:var(--success);}
    .toast.error{border-color:rgba(239,68,68,0.35);color:var(--danger);}
    .toast.info{border-color:rgba(59,130,246,0.35);color:var(--blue-bright);}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--navy-light);border-radius:4px;}
    @media(max-width:700px){.sidebar{width:100%;height:44vh;border-right:none;border-bottom:1px solid var(--border);}.app{flex-direction:column;height:auto;}.editor{height:56vh;}.hdr-field.w200{width:130px;}.hdr-field.w150{width:110px;}}
  </style>
</head>
<body>
<header>
  <div class="logo">Vortex<span>Labs</span> Blog Generator</div>
  <div class="hdr-sep"></div>
  <input type="password" class="hdr-field w200" id="openaiKey" placeholder="OpenAI key (sk-...)" />
  <input type="password" class="hdr-field w150" id="githubPat" placeholder="GitHub PAT" />
  <button class="btn-sm" onclick="saveKeys()">Save Keys</button>
  <span class="tag missing" id="keyStatus">No keys</span>
</header>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" id="tabTopics" onclick="switchTab('topics')">Topics</button>
      <button class="stab" id="tabPrompt" onclick="switchTab('prompt')">Prompt</button>
      <button class="stab" id="tabSeo" onclick="switchTab('seo')">SEO Audit</button>
    </div>
    <div class="topics-panel" id="topicsPanel">
      <div class="topic-search-bar">
        <input type="text" class="topic-input" id="customInput" placeholder="Custom topic (optional)..." />
        <button class="btn-fetch" id="fetchBtn" onclick="fetchTopics()">Fetch</button>
      </div>
      <div class="topics-list" id="topicsList"></div>
    </div>
    <div class="prompt-panel" id="promptPanel">
      <div class="prompt-label">Writing Rules / System Prompt</div>
      <textarea class="prompt-textarea" id="systemPrompt"></textarea>
      <div class="prompt-actions">
        <button class="btn-save-prompt" onclick="savePrompt()">Save</button>
        <button class="btn-reset-prompt" onclick="resetPrompt()">Reset</button>
      </div>
    </div>
    <div class="seo-panel" id="seoPanel">
      <div id="seoContent"><div class="seo-empty">Generate a post to see SEO audit</div></div>
    </div>
  </div>
  <div class="editor">
    <div class="editor-toolbar">
      <div class="editor-title" id="editorTitle">Select a topic and click Write</div>
      <div class="editor-tabs">
        <button class="etab active" id="etabPreview" onclick="switchEditorTab('preview')">Preview</button>
        <button class="etab" id="etabSource" onclick="switchEditorTab('source')">HTML</button>
      </div>
      <div class="editor-actions">
        <button class="btn-dl" id="dlBtn" onclick="downloadCurrent()" disabled>Download</button>
        <button class="btn-publish" id="publishBtn" onclick="publishToGitHub()" disabled>Publish to GitHub</button>
      </div>
    </div>
    <div class="editor-body" id="editorBody">
      <div class="empty-state"><div class="empty-icon">&#9997;&#65039;</div><p>Pick a topic from the left and click Write</p></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const LANDING_PAGE="https://vortexlabs.app/meta-dashboard-free-download.html";
const GH_USER="vaswinraaju-png",GH_REPO="vortex_labs",GH_BRANCH="main",GH_FOLDER="blogs";
let currentPost=null,currentEditorTab='preview',topics=[];
const DEFAULT_PROMPT=`You are an expert performance marketing copywriter for VortexLabs.\n\nRules:\n- Write for performance marketers, media buyers, agencies, small business owners running Meta/Facebook Ads\n- Use PAS, AIDA, or BAB frameworks as specified\n- Open with a powerful hook: bold stat, direct pain point, or confrontational question\n- 900 to 1200 words per post\n- H2 and H3 subheadings throughout\n- 2 to 3 specific realistic scenarios or examples\n- End with a CTA driving urgency, trust, or motivation\n- Never use em dashes\n- No filler phrases like "In today's digital landscape" or "In conclusion"\n- Plain, direct, conversational English\n- Naturally weave the focus keyword into first 100 words, at least 2 H2s, and 3+ times total`;
const SEED=[
  {slug:"meta-ads-reporting-without-spreadsheets",title:"Why Meta Ads Reporting in Spreadsheets Is Killing Your Productivity",framework:"PAS",angle:"Urgency"},
  {slug:"roas-dropping-meta-ads",title:"Your ROAS Is Dropping and You're the Last to Know It",framework:"PAS",angle:"Fear"},
  {slug:"meta-ads-dashboard-freelancers",title:"The One Tool Every Freelance Media Buyer Needs in 2025",framework:"AIDA",angle:"Trust"},
  {slug:"client-reporting-meta-ads",title:"How to Send Meta Ads Reports Clients Actually Understand",framework:"BAB",angle:"Trust"},
  {slug:"reduce-cpl-meta-ads",title:"5 Reasons Your CPL Is High (And How to Fix It Fast)",framework:"PAS",angle:"Motivation"},
  {slug:"meta-ads-mistakes-agencies",title:"The Meta Ads Mistakes Most Agencies Make Every Single Month",framework:"PAS",angle:"Fear"},
  {slug:"facebook-ads-small-business",title:"Facebook Ads for Small Business Owners Who Don't Have Time to Waste",framework:"BAB",angle:"Empathy"},
  {slug:"meta-ads-creative-fatigue",title:"Creative Fatigue Is Draining Your Budget. Here's the Fix.",framework:"PAS",angle:"Urgency"},
  {slug:"scale-meta-ads-campaigns",title:"How to Scale Meta Ads Without Watching Everything Break",framework:"AIDA",angle:"Motivation"},
  {slug:"meta-ads-account-audit",title:"Run a Meta Ads Account Audit in Under 30 Minutes",framework:"BAB",angle:"Trust"},
  {slug:"media-buyer-productivity",title:"How Top Media Buyers Manage 10 Ad Accounts Without Burning Out",framework:"AIDA",angle:"Aspiration"},
  {slug:"meta-ads-reporting-tools-cost",title:"Why Are You Paying $50 a Month Just to See Your Own Ad Data?",framework:"PAS",angle:"Anger"},
  {slug:"facebook-ads-metrics-that-matter",title:"The Only 5 Meta Ads Metrics That Actually Matter",framework:"AIDA",angle:"Trust"},
  {slug:"meta-ads-founders-report",title:"What Your Founder Wants to See in Your Meta Ads Report",framework:"BAB",angle:"Trust"},
  {slug:"ad-spend-wastage-meta",title:"You're Wasting 30% of Your Ad Spend. Here's the Proof.",framework:"PAS",angle:"Fear"},
  {slug:"meta-ads-weekly-review",title:"The 15-Minute Weekly Meta Ads Review That Saves Thousands",framework:"BAB",angle:"Motivation"},
  {slug:"multi-account-meta-ads",title:"Managing Multiple Meta Ad Accounts? You Need a System.",framework:"PAS",angle:"Empathy"},
  {slug:"meta-ads-vs-ads-manager",title:"Meta Ads Manager vs a Proper Dashboard: What's the Difference?",framework:"AIDA",angle:"Trust"},
  {slug:"performance-marketing-reporting-2025",title:"Performance Marketing Reporting in 2025: What's Changed",framework:"AIDA",angle:"Authority"},
  {slug:"meta-ads-ecommerce-losses",title:"Why eCommerce Brands Lose Money on Meta Ads (And How to Stop)",framework:"BAB",angle:"Fear"},
];
window.onload=()=>{
  const ok=localStorage.getItem('vl_openai'),gk=localStorage.getItem('vl_github');
  if(ok)document.getElementById('openaiKey').value=ok;
  if(gk)document.getElementById('githubPat').value=gk;
  updateKeyStatus();
  document.getElementById('systemPrompt').value=localStorage.getItem('vl_system_prompt')||DEFAULT_PROMPT;
  topics=[...SEED];renderTopics();
};
function saveKeys(){
  const ok=document.getElementById('openaiKey').value.trim(),gk=document.getElementById('githubPat').value.trim();
  if(ok)localStorage.setItem('vl_openai',ok);if(gk)localStorage.setItem('vl_github',gk);
  updateKeyStatus();toast('Keys saved','success');
}
function updateKeyStatus(){
  const ok=localStorage.getItem('vl_openai'),gk=localStorage.getItem('vl_github');
  const el=document.getElementById('keyStatus');
  if(ok&&gk){el.textContent='Keys saved';el.className='tag saved';}
  else if(ok){el.textContent='PAT missing';el.className='tag missing';}
  else{el.textContent='No keys';el.className='tag missing';}
}
function savePrompt(){localStorage.setItem('vl_system_prompt',document.getElementById('systemPrompt').value);toast('Prompt saved','success');}
function resetPrompt(){document.getElementById('systemPrompt').value=DEFAULT_PROMPT;localStorage.setItem('vl_system_prompt',DEFAULT_PROMPT);toast('Reset to default','info');}
function switchTab(tab){
  ['Topics','Prompt','Seo'].forEach(t=>{
    const k=t.toLowerCase();
    document.getElementById('tab'+t).classList.toggle('active',k===tab);
  });
  document.getElementById('topicsPanel').style.display=tab==='topics'?'flex':'none';
  const pp=document.getElementById('promptPanel');pp.style.display=tab==='prompt'?'flex':'none';pp.classList.toggle('visible',tab==='prompt');
  const sp=document.getElementById('seoPanel');sp.style.display=tab==='seo'?'flex':'none';sp.classList.toggle('visible',tab==='seo');
}
function switchEditorTab(tab){
  currentEditorTab=tab;
  document.getElementById('etabPreview').classList.toggle('active',tab==='preview');
  document.getElementById('etabSource').classList.toggle('active',tab==='source');
  if(!currentPost)return;
  if(tab==='preview'){document.getElementById('editorBody').innerHTML=`<div class="preview-wrap">${buildPreview(currentPost.topic,currentPost.md)}</div>`;}
  else{document.getElementById('editorBody').innerHTML=`<div class="source-wrap"><pre class="source-pre">${escHtml(currentPost.html)}</pre></div>`;}
}
async function fetchTopics(){
  const key=localStorage.getItem('vl_openai');if(!key){toast('Save your OpenAI key first','error');return;}
  const custom=document.getElementById('customInput').value.trim();
  const btn=document.getElementById('fetchBtn');btn.disabled=true;btn.textContent='Fetching...';
  const prompt=custom
    ?`Generate 8 SEO blog post topic ideas about: "${custom}". Target: performance marketers running Meta/Facebook Ads. Return JSON array only, no markdown. Format: [{"slug":"url-slug","title":"Title","framework":"PAS or AIDA or BAB","angle":"Urgency or Trust or Motivation or Fear or Empathy"}]`
    :`Generate 20 diverse SEO blog topics for performance marketers running Meta/Facebook Ads. Return JSON array only, no markdown. Format: [{"slug":"url-slug","title":"Title","framework":"PAS or AIDA or BAB","angle":"Urgency or Trust or Motivation or Fear or Empathy"}]`;
  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:'gpt-4o',max_tokens:1500,temperature:0.9,messages:[{role:'system',content:'Return only valid JSON arrays. No markdown.'},{role:'user',content:prompt}]})});
    const data=await res.json();if(!res.ok)throw new Error(data.error?.message||'API error');
    const text=data.choices[0].message.content.replace(/```json|```/g,'').trim();
    topics=JSON.parse(text);renderTopics();toast(`${topics.length} topics fetched`,'success');
  }catch(e){toast('Fetch failed: '+e.message,'error');}
  btn.disabled=false;btn.textContent='Fetch';
}
function renderTopics(){
  const list=document.getElementById('topicsList');
  if(!topics.length){list.innerHTML=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">No topics yet.</div>`;return;}
  list.innerHTML=topics.map((t,i)=>`<div class="topic-item" id="ti-${i}"><div class="topic-item-title">${t.title}</div><div class="topic-item-meta"><span class="fw-tag">${t.framework}</span><span>${t.angle}</span></div><div class="topic-actions"><button class="btn-write" onclick="writeTopic(${i})">Write</button></div></div>`).join('');
}
async function writeTopic(idx){
  const key=localStorage.getItem('vl_openai');if(!key){toast('Save your OpenAI key first','error');return;}
  const topic=topics[idx];const sysPrompt=document.getElementById('systemPrompt').value;
  document.querySelectorAll('.topic-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`ti-${idx}`)?.classList.add('active');
  const btn=document.querySelector(`#ti-${idx} .btn-write`);
  if(btn){btn.disabled=true;btn.textContent='Writing...';}
  document.getElementById('editorTitle').textContent=topic.title;
  document.getElementById('editorTitle').className='editor-title active';
  document.getElementById('editorBody').innerHTML=`<div class="gen-state"><div class="spinner"></div><div class="gen-label">Generating SEO metadata...</div></div>`;
  document.getElementById('dlBtn').disabled=true;document.getElementById('publishBtn').disabled=true;

  let seoMeta={focusKeyword:topic.slug.replace(/-/g,' '),metaTitle:topic.title.slice(0,60),metaDescription:''};
  try{
    document.querySelector('.gen-label').textContent='Generating SEO metadata...';
    const metaRes=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:'gpt-4o',max_tokens:300,temperature:0.7,messages:[{role:'system',content:'Return only valid JSON. No markdown.'},{role:'user',content:`Generate SEO metadata for this blog post.\nTitle: "${topic.title}"\nAudience: Performance marketers running Meta/Facebook Ads\nReturn JSON: {"focusKeyword":"2-4 word keyword","metaTitle":"55-60 char SEO title","metaDescription":"150-160 char description with keyword and clear benefit. No em dashes."}`}]})});
    const metaData=await metaRes.json();
    const metaText=metaData.choices[0].message.content.replace(/```json|```/g,'').trim();
    seoMeta=JSON.parse(metaText);
  }catch(e){/* use defaults */}

  try{
    document.querySelector('.gen-label').textContent='Writing blog post...';
    const userPrompt=`Write a complete SEO blog post using the ${topic.framework} framework.\n\nTitle: "${topic.title}"\nFocus keyword: "${seoMeta.focusKeyword}"\nConversion goal: ${topic.angle}\nTarget reader: Performance marketers, media buyers, agencies, small business owners running Meta/Facebook Ads\n\nRequirements:\n- 900 to 1200 words\n- Use ${topic.framework} framework throughout\n- Include focus keyword "${seoMeta.focusKeyword}" in first 100 words, at least 2 H2 headings, and 3+ times total\n- Strong hook in opening\n- H2 and H3 subheadings\n- 2 to 3 specific realistic examples\n- LSI keywords: Meta Ads, Facebook advertising, ROAS, CPL, media buyer, campaign dashboard, ad spend\n- End with CTA referencing: ${LANDING_PAGE}\n- No em dashes anywhere\n- Body content only, use ## for H2 and ### for H3`;
    const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:'gpt-4o',max_tokens:3000,temperature:0.8,messages:[{role:'system',content:sysPrompt},{role:'user',content:userPrompt}]})});
    const data=await res.json();if(!res.ok)throw new Error(data.error?.message||'API error');
    const md=data.choices[0].message.content;
    const html=wrapInHTML(topic,md,seoMeta);
    currentPost={topic,html,md,slug:topic.slug,seoMeta};
    document.getElementById('editorBody').innerHTML=`<div class="preview-wrap">${buildPreview(topic,md)}</div>`;
    document.getElementById('dlBtn').disabled=false;document.getElementById('publishBtn').disabled=false;
    currentEditorTab='preview';
    document.getElementById('etabPreview').classList.add('active');document.getElementById('etabSource').classList.remove('active');
    renderSeoAudit(topic,md,seoMeta,html);
    toast('Post written','success');
  }catch(e){
    document.getElementById('editorBody').innerHTML=`<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div><p>${e.message}</p></div>`;
    toast('Write failed: '+e.message,'error');
  }
  if(btn){btn.disabled=false;btn.textContent='Write';}
}
function renderSeoAudit(topic,md,seoMeta,html){
  const wordCount=md.split(/\s+/).length;
  const keyword=seoMeta.focusKeyword.toLowerCase();
  const mdLower=md.toLowerCase();
  const kwCount=(mdLower.match(new RegExp(keyword.replace(/\s+/g,'\\s+'),'g'))||[]).length;
  const kwIn100=mdLower.slice(0,600).includes(keyword);
  const h2c=(md.match(/^## /gm)||[]).length,h3c=(md.match(/^### /gm)||[]).length;
  const titleLen=seoMeta.metaTitle.length,descLen=seoMeta.metaDescription.length;
  const checks=[
    {section:'TECHNICAL SEO'},
    {l:'Canonical URL',p:html.includes('rel="canonical"'),n:html.includes('rel="canonical"')?'Present':'Missing'},
    {l:'JSON-LD Schema (BlogPosting)',p:html.includes('application/ld+json'),n:html.includes('application/ld+json')?'BlogPosting schema present':'Missing'},
    {l:'Open Graph Tags',p:html.includes('og:title'),n:html.includes('og:title')?'og:title, og:description, og:url set':'Missing OG tags'},
    {l:'Twitter Card',p:html.includes('twitter:card'),n:html.includes('twitter:card')?'summary_large_image set':'Missing'},
    {l:'Robots Meta',p:html.includes('name="robots"'),n:html.includes('name="robots"')?'index, follow set':'Missing robots meta'},
    {l:'Mobile Viewport',p:true,n:'Responsive layout baked in'},
    {l:'No Render-Blocking Scripts',p:true,n:'Inline CSS, deferred fonts'},
    {section:'ON-PAGE SEO'},
    {l:'Meta Title Length',p:titleLen>=50&&titleLen<=60,w:titleLen>=40&&titleLen<50,n:`${titleLen} chars (ideal: 50-60)`},
    {l:'Meta Description Length',p:descLen>=150&&descLen<=160,w:descLen>=130&&descLen<150,n:`${descLen} chars (ideal: 150-160)`},
    {l:'Keyword in Meta Title',p:seoMeta.metaTitle.toLowerCase().includes(keyword),n:seoMeta.metaTitle.toLowerCase().includes(keyword)?'Present':'Missing from title'},
    {l:'Keyword in Meta Description',p:seoMeta.metaDescription.toLowerCase().includes(keyword),n:seoMeta.metaDescription.toLowerCase().includes(keyword)?'Present':'Missing from description'},
    {l:'Keyword in First 100 Words',p:kwIn100,n:kwIn100?'Present in opening':'Not found in opening paragraph'},
    {l:'Keyword Density',p:kwCount>=3,w:kwCount>=1,n:`${kwCount} occurrences (ideal: 3+)`},
    {l:'H2 Count',p:h2c>=3,w:h2c>=2,n:`${h2c} H2 tags (ideal: 3+)`},
    {l:'H3 Count',p:h3c>=2,w:h3c>=1,n:`${h3c} H3 tags`},
    {l:'Word Count',p:wordCount>=900,w:wordCount>=700,n:`${wordCount} words (ideal: 900-1200)`},
    {l:'Internal Link to Landing Page',p:html.includes(LANDING_PAGE),n:html.includes(LANDING_PAGE)?'CTA link present':'Missing internal link'},
    {l:'No Em Dashes',p:!md.includes('\u2014'),n:md.includes('\u2014')?'Em dashes found - fix before publishing':'Clean'},
    {l:'LSI Keywords Present',p:mdLower.includes('roas')||mdLower.includes('cpl')||mdLower.includes('ad spend'),n:'ROAS, CPL, ad spend detected in body'},
  ];
  let score=0,max=0;
  checks.forEach(c=>{if(!c.section){max+=5;if(c.p)score+=5;else if(c.w)score+=2;}});
  const pct=Math.round((score/max)*100);
  const sc=pct>=80?'good':pct>=60?'ok':'bad';
  const sl=pct>=80?'Strong':pct>=60?'Needs improvement':'Poor';
  document.getElementById('seoContent').innerHTML=`
    <div class="seo-score-bar"><div class="seo-score-num ${sc}">${pct}</div><div><div style="font-size:13px;font-weight:700;color:var(--white)">${sl}</div><div style="font-size:11px;color:var(--muted)">SEO Score / 100</div></div></div>
    <div style="font-size:11px;color:var(--muted);padding:0 2px">Focus keyword: <strong style="color:var(--white)">${seoMeta.focusKeyword}</strong></div>
    ${checks.map(c=>c.section
      ?`<div class="seo-section-title">${c.section}</div>`
      :`<div class="seo-item"><div class="seo-dot ${c.p?'pass':c.w?'warn':'fail'}"></div><div><div class="seo-item-label">${c.l}</div><div class="seo-item-val">${c.n}</div></div></div>`
    ).join('')}`;
}
function buildPreview(topic,md){
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  return `<p style="font-size:11px;color:var(--muted);margin-bottom:18px">${topic.framework} &nbsp;&middot;&nbsp; ${topic.angle} &nbsp;&middot;&nbsp; ${date}</p><h1>${topic.title}</h1>${markdownToHTML(md)}<div class="preview-cta"><h2>Stop Flying Blind on Your Meta Ads.</h2><p>One clean dashboard for every metric that matters. Built by a performance marketer, for performance marketers.</p><a href="${LANDING_PAGE}" target="_blank">Get the Free Dashboard</a></div>`;
}
function wrapInHTML(topic,md,seoMeta){
  const date=new Date().toISOString();
  const dateR=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const SC='<'+'script';
  const EC='<'+'/script>';
  const jsonLd=JSON.stringify({"@context":"https://schema.org","@type":"BlogPosting","headline":topic.title,"description":seoMeta.metaDescription.replace(/"/g,"'"),"keywords":seoMeta.focusKeyword+", meta ads, facebook advertising, performance marketing, ROAS, CPL","datePublished":date,"publisher":{"@type":"Organization","name":"VortexLabs","url":"https://vortexlabs.app"},"url":"https://vortexlabs.app/blogs/"+topic.slug+".html"});
  const parts=[
    '<!DOCTYPE html>',
    '<html lang="en">',
    '<head>',
    '<meta charset="UTF-8"/>',
    '<meta name="viewport" content="width=device-width,initial-scale=1.0"/>',
    '<title>'+seoMeta.metaTitle+'</title>',
    '<meta name="description" content="'+seoMeta.metaDescription+'"/>',
    '<meta name="robots" content="index, follow"/>',
    '<link rel="canonical" href="https://vortexlabs.app/blogs/'+topic.slug+'.html"/>',
    '<meta property="og:title" content="'+seoMeta.metaTitle+'"/>',
    '<meta property="og:description" content="'+seoMeta.metaDescription+'"/>',
    '<meta property="og:type" content="article"/>',
    '<meta property="og:url" content="https://vortexlabs.app/blogs/'+topic.slug+'.html"/>',
    '<meta name="twitter:card" content="summary_large_image"/>',
    '<meta name="twitter:title" content="'+seoMeta.metaTitle+'"/>',
    '<meta name="twitter:description" content="'+seoMeta.metaDescription+'"/>',
    SC+' type="application/ld+json">'+jsonLd+EC,
    '<!-- Google tag (gtag.js) -->',
    SC+' async src="https://www.googletagmanager.com/gtag/js?id=G-3ET2SV2XP5">'+EC,
    SC+'>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-3ET2SV2XP5");'+EC,
    '<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>',
    '<style>:root{--navy:#0a1628;--navy-mid:#112040;--blue:#2563eb;--blue-bright:#3b82f6;--white:#fff;--off:#d4dff5;--muted:#8aa0c4;--border:rgba(255,255,255,0.08);--success:#22c55e;}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{font-family:\'DM Sans\',sans-serif;background:var(--navy);color:var(--off);line-height:1.75;}nav{padding:15px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.97);position:sticky;top:0;z-index:100;}.nav-logo{font-size:14px;font-weight:700;color:var(--white);text-decoration:none;}.nav-logo span{color:var(--blue-bright);}.nav-btn{background:var(--blue);color:var(--white);border:none;padding:8px 18px;border-radius:8px;font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}.hero{padding:52px 24px 28px;max-width:760px;margin:0 auto;}.meta{font-size:12px;color:var(--muted);margin-bottom:12px;}.meta span{color:var(--blue-bright);font-weight:600;}h1{font-size:clamp(22px,4vw,36px);font-weight:700;letter-spacing:-0.8px;line-height:1.2;color:var(--white);}.body{max-width:760px;margin:0 auto;padding:28px 24px 60px;}.body h2{font-size:20px;font-weight:700;color:var(--white);margin:32px 0 10px;}.body h3{font-size:16px;font-weight:600;color:var(--white);margin:20px 0 7px;}.body p{margin-bottom:16px;font-size:16px;}.body ul,.body ol{margin:0 0 16px 20px;}.body li{margin-bottom:7px;font-size:16px;}.body strong{color:var(--white);font-weight:600;}.cta-block{background:var(--navy-mid);border:1px solid rgba(59,130,246,0.25);border-radius:16px;padding:38px 30px;text-align:center;margin-top:44px;}.cta-block h2{font-size:22px;font-weight:700;color:var(--white);margin-bottom:9px;}.cta-block p{font-size:15px;color:var(--muted);margin-bottom:22px;}.cta-btn{display:inline-block;background:var(--blue);color:var(--white);padding:13px 28px;border-radius:10px;font-family:\'DM Sans\',sans-serif;font-size:15px;font-weight:700;text-decoration:none;}.free-badge{display:inline-block;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:var(--success);font-size:12px;font-weight:700;padding:3px 12px;border-radius:100px;margin-bottom:13px;}footer{border-top:1px solid var(--border);padding:22px;text-align:center;font-size:12px;color:var(--muted);}footer a{color:var(--blue-bright);text-decoration:none;}@media(max-width:600px){.hero,.body{padding-left:18px;padding-right:18px;}}</style>',
    '</head>',
    '<body>',
    '<nav><a href="https://vortexlabs.app" class="nav-logo">Vortex<span>Labs</span></a><a href="'+LANDING_PAGE+'" class="nav-btn">Get the Dashboard</a></nav>',
    '<div class="hero"><div class="meta"><span>VortexLabs Blog</span> &nbsp;&middot;&nbsp; '+dateR+' &nbsp;&middot;&nbsp; Performance Marketing</div><h1>'+topic.title+'</h1></div>',
    '<div class="body">',
    markdownToHTML(md),
    '<div class="cta-block"><div class="free-badge">Free Access</div><h2>Stop Flying Blind on Your Meta Ads.</h2><p>One clean dashboard for every metric that matters. No expensive tools. No tab-switching. Built by a performance marketer, for performance marketers.</p><a href="'+LANDING_PAGE+'" class="cta-btn">Get the Free Dashboard</a></div>',
    '</div>',
    '<footer><p>Part of <a href="https://vortexlabs.app">VortexLabs</a> &nbsp;&middot;&nbsp; Built by a Performance Marketer, for Performance Marketers</p></footer>',

}
function markdownToHTML(md){
  return md.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).split('\n').map(line=>{line=line.trim();if(!line)return '';if(/^<(h[23]|ul|li)/.test(line))return line;return `<p>${line}</p>`;}).filter(Boolean).join('\n');
}
function downloadCurrent(){
  if(!currentPost)return;
  const blob=new Blob([currentPost.html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${currentPost.slug}.html`;a.click();
}
async function publishToGitHub(){
  const pat=localStorage.getItem('vl_github');if(!pat){toast('Save your GitHub PAT first','error');return;}
  if(!currentPost)return;
  const btn=document.getElementById('publishBtn');btn.disabled=true;btn.textContent='Publishing...';

  const GH_HEADERS={'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'};

  try{
    // 1. Publish blog post
    btn.textContent='Publishing post...';
    const postPath=`${GH_FOLDER}/${currentPost.slug}.html`;
    const postUrl=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${postPath}`;
    const postContent=btoa(unescape(encodeURIComponent(currentPost.html)));
    let postSha=null;
    const postCheck=await fetch(postUrl,{headers:GH_HEADERS});
    if(postCheck.ok){const ex=await postCheck.json();postSha=ex.sha;}
    const postRes=await fetch(postUrl,{method:'PUT',headers:GH_HEADERS,body:JSON.stringify({message:`Add blog: ${currentPost.topic.title}`,content:postContent,branch:GH_BRANCH,...(postSha?{sha:postSha}:{})})});
    if(!postRes.ok){const err=await postRes.json();throw new Error(err.message||'Post publish failed');}

    // 2. Update sitemap.xml
    btn.textContent='Updating sitemap...';
    const sitemapPath='sitemap.xml';
    const sitemapUrl=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${sitemapPath}`;
    const newPostUrl=`https://vortexlabs.app/blogs/${currentPost.slug}.html`;
    const today=new Date().toISOString().split('T')[0];
    let sitemapSha=null;
    let existingUrls=[];

    const sitemapCheck=await fetch(sitemapUrl,{headers:GH_HEADERS});
    if(sitemapCheck.ok){
      const sitemapData=await sitemapCheck.json();
      sitemapSha=sitemapData.sha;
      const decoded=decodeURIComponent(escape(atob(sitemapData.content.replace(/\n/g,''))));
      // Extract existing <loc> URLs
      const matches=decoded.match(/<loc>(.*?)<\/loc>/g)||[];
      existingUrls=matches.map(m=>m.replace(/<\/?loc>/g,''));
    }

    // Add new URL if not already present
    if(!existingUrls.includes(newPostUrl)) existingUrls.push(newPostUrl);

    // Always include landing page
    const landingUrl='https://vortexlabs.app/meta-dashboard-free-download.html';
    if(!existingUrls.includes(landingUrl)) existingUrls.unshift(landingUrl);

    const sitemapXml=`<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${existingUrls.map(u=>`  <url>
    <loc>${u}</loc>
    <lastmod>${today}</lastmod>
    <changefreq>${u.includes('/blogs/')?'monthly':'weekly'}</changefreq>
    <priority>${u===landingUrl?'1.0':u.includes('/blogs/')?'0.8':'0.7'}</priority>
  </url>`).join('\n')}
</urlset>`;

    const sitemapContent=btoa(unescape(encodeURIComponent(sitemapXml)));
    const sitemapRes=await fetch(sitemapUrl,{method:'PUT',headers:GH_HEADERS,body:JSON.stringify({message:`Update sitemap: add ${currentPost.slug}`,content:sitemapContent,branch:GH_BRANCH,...(sitemapSha?{sha:sitemapSha}:{})})});
    if(!sitemapRes.ok){const err=await sitemapRes.json();throw new Error('Sitemap update failed: '+err.message);}

    // 3. Ping Google
    btn.textContent='Pinging Google...';
    try{
      await fetch(`https://www.google.com/ping?sitemap=https://vortexlabs.app/sitemap.xml`,{mode:'no-cors'});
    }catch(e){/* no-cors always throws, that's fine */}

    toast(`Published + sitemap updated + Google pinged`, 'success');

  }catch(e){toast('Error: '+e.message,'error');}
  btn.disabled=false;btn.textContent='Publish to GitHub';
}
function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type='info'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;setTimeout(()=>{el.className='toast';},3000);}
</script>
