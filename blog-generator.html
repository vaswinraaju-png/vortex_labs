<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Generator — VortexLabs</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#0a1628;--navy-mid:#112040;--navy-light:#1a3060;--blue:#2563eb;--blue-bright:#3b82f6;--blue-glow:rgba(37,99,235,0.15);--white:#fff;--off:#d4dff5;--muted:#8aa0c4;--border:rgba(255,255,255,0.08);--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
    header{padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(10,22,40,0.98);position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .logo{font-size:14px;font-weight:700;margin-right:4px;white-space:nowrap;}
    .logo span{color:var(--blue-bright);}
    .hdr-field{background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;}
    .hdr-field:focus{border-color:var(--blue);}
    .hdr-field::placeholder{color:var(--muted);}
    .hdr-field.w200{width:200px;}.hdr-field.w150{width:150px;}
    .btn-sm{padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--navy-light);color:var(--white);transition:all 0.15s;white-space:nowrap;}
    .btn-sm:hover{background:var(--blue);border-color:var(--blue);}
    .tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
    .tag.saved{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.25);}
    .tag.missing{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
    .hdr-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
    .app{display:flex;height:calc(100vh - 53px);}
    .sidebar{width:320px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);}
    .stab{flex:1;padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
    .stab.active{color:var(--white);border-bottom-color:var(--blue);}
    .topics-panel{display:flex;flex-direction:column;flex:1;overflow:hidden;}
    .topic-search-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:center;}
    .topic-input{flex:1;background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;}
    .topic-input:focus{border-color:var(--blue);}
    .topic-input::placeholder{color:var(--muted);}
    .btn-fetch{background:var(--blue);border:none;color:var(--white);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
    .btn-fetch:hover{background:var(--blue-bright);}
    .btn-fetch:disabled{opacity:0.4;cursor:not-allowed;}
    .topics-list{flex:1;overflow-y:auto;padding:8px;}
    .topic-item{background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color 0.15s;}
    .topic-item:hover{border-color:rgba(59,130,246,0.35);}
    .topic-item.active{border-color:var(--blue);background:var(--blue-glow);}
    .topic-item-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:5px;}
    .topic-item-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .fw-tag{font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:var(--blue-bright);background:var(--blue-glow);border:1px solid rgba(59,130,246,0.2);padding:2px 6px;border-radius:4px;}
    .topic-actions{display:flex;gap:6px;margin-top:8px;}
    .btn-write{background:var(--blue);border:none;color:var(--white);padding:5px 13px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-write:hover{background:var(--blue-bright);}
    .btn-write:disabled{opacity:0.4;cursor:not-allowed;}
    .prompt-panel{display:none;flex-direction:column;flex:1;overflow:hidden;padding:12px;gap:8px;}
    .prompt-panel.visible{display:flex;}
    .prompt-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;}
    .prompt-textarea{flex:1;background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--off);line-height:1.6;resize:none;outline:none;}
    .prompt-textarea:focus{border-color:var(--blue);}
    .prompt-actions{display:flex;gap:7px;}
    .btn-save-prompt{background:var(--blue);border:none;color:var(--white);padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-reset-prompt{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
    .btn-reset-prompt:hover{border-color:var(--muted);color:var(--white);}
    .seo-panel{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:12px;gap:8px;}
    .seo-panel.visible{display:flex;}
    .seo-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;margin-top:6px;padding:0 2px;}
    .seo-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;}
    .seo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .seo-dot.pass{background:var(--success);}
    .seo-dot.warn{background:var(--warning);}
    .seo-dot.fail{background:var(--danger);}
    .seo-dot.na{background:transparent;}
    .seo-item-label{font-size:12px;font-weight:600;margin-bottom:2px;}
    .seo-item-val{font-size:11px;color:var(--muted);line-height:1.4;}
    .seo-score-bar{background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
    .seo-score-num{font-size:28px;font-weight:700;}
    .seo-score-num.good{color:var(--success);}
    .seo-score-num.ok{color:var(--warning);}
    .seo-score-num.bad{color:var(--danger);}
    .seo-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}
    .editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .editor-toolbar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    .editor-title{font-size:13px;font-weight:600;color:var(--muted);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .editor-title.active{color:var(--white);}
    .editor-tabs{display:flex;gap:5px;}
    .etab{padding:5px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);}
    .etab.active{background:var(--navy-light);color:var(--white);border-color:var(--navy-light);}
    .editor-actions{display:flex;gap:7px;}
    .btn-dl{background:var(--navy-light);border:1px solid var(--border);color:var(--white);padding:7px 13px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .btn-dl:hover{background:var(--blue);border-color:var(--blue);}
    .btn-dl:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-publish{background:var(--success);border:none;color:var(--white);padding:7px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-publish:hover{opacity:0.85;}
    .btn-publish:disabled{opacity:0.4;cursor:not-allowed;}
    .editor-body{flex:1;overflow-y:auto;}
    .preview-wrap{padding:28px 36px;max-width:800px;margin:0 auto;}
    .preview-wrap h1{font-size:26px;font-weight:700;color:var(--white);letter-spacing:-0.5px;margin-bottom:18px;line-height:1.25;}
    .preview-wrap h2{font-size:19px;font-weight:700;color:var(--white);margin:30px 0 9px;}
    .preview-wrap h3{font-size:15px;font-weight:600;color:var(--white);margin:18px 0 7px;}
    .preview-wrap p{font-size:14px;color:var(--off);line-height:1.75;margin-bottom:14px;}
    .preview-wrap ul,.preview-wrap ol{margin:0 0 14px 18px;}
    .preview-wrap li{font-size:14px;color:var(--off);line-height:1.7;margin-bottom:5px;}
    .preview-wrap strong{color:var(--white);}
    .preview-wrap .tbl-wrap{overflow-x:auto;margin:20px 0;}
    .preview-wrap table{width:100%;border-collapse:collapse;font-size:13px;}
    .preview-wrap th{background:var(--blue);color:#fff;padding:10px 14px;text-align:left;font-weight:700;font-size:12px;}
    .preview-wrap td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--off);}
    .preview-wrap tr:nth-child(even) td{background:rgba(255,255,255,0.03);}
    .preview-wrap tr:hover td{background:rgba(59,130,246,0.07);}
    .preview-cta{background:#fff;border:2px solid var(--blue);border-radius:14px;padding:32px;text-align:center;margin-top:36px;}
    .preview-cta h2{font-size:20px;color:var(--blue);margin-bottom:8px;font-weight:700;}
    .preview-cta p{margin-bottom:18px;color:#475569;font-size:14px;}
    .preview-cta a{display:inline-block;background:var(--blue);color:#fff;padding:12px 26px;border-radius:9px;font-weight:700;text-decoration:none;font-size:14px;}
    .preview-mid-cta{background:#fff;border:2px solid var(--blue);border-radius:10px;padding:16px 20px;margin:28px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .preview-mid-cta strong{font-size:14px;font-weight:700;color:var(--blue);display:block;margin-bottom:3px;}
    .preview-mid-cta span{font-size:12px;color:#475569;}
    .preview-mid-cta a{display:inline-block;background:var(--blue);color:#fff;padding:8px 16px;border-radius:7px;font-weight:700;text-decoration:none;font-size:12px;white-space:nowrap;}
    .source-wrap{padding:14px;height:100%;}
    .source-pre{background:var(--navy-mid);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:var(--off);line-height:1.6;overflow:auto;height:calc(100% - 28px);white-space:pre-wrap;word-break:break-all;}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);}
    .empty-icon{font-size:36px;opacity:0.4;}
    .empty-state p{font-size:13px;}
    .gen-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .gen-label{font-size:13px;color:var(--muted);}
    .toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--navy-mid);border:1px solid var(--border);border-radius:9px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transform:translateY(6px);transition:all 0.2s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.success{border-color:rgba(34,197,94,0.35);color:var(--success);}
    .toast.error{border-color:rgba(239,68,68,0.35);color:var(--danger);}
    .toast.info{border-color:rgba(59,130,246,0.35);color:var(--blue-bright);}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--navy-light);border-radius:4px;}
    /* fix btn per seo item */
    .seo-fix-btn{background:none;border:1px solid rgba(239,68,68,0.4);color:var(--danger);padding:2px 8px;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;cursor:pointer;margin-left:auto;flex-shrink:0;white-space:nowrap;}
    .seo-fix-btn:hover{background:rgba(239,68,68,0.1);}
    .seo-fix-btn.fixing{opacity:0.5;cursor:not-allowed;}
    .seo-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;background:var(--navy-mid);border:1px solid var(--border);border-radius:7px;}
    /* schedule modal */
    .sch-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:20px;}
    .sch-modal.open{display:flex;}
    .sch-box{background:var(--navy-mid);border:1px solid rgba(59,130,246,0.25);border-radius:14px;padding:28px;width:100%;max-width:380px;}
    .sch-box h3{font-size:16px;font-weight:700;margin-bottom:6px;}
    .sch-box p{font-size:13px;color:var(--muted);margin-bottom:18px;}
    .sch-input{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:12px;}
    .sch-input:focus{border-color:var(--blue);}
    .sch-actions{display:flex;gap:8px;}
    .btn-sch-confirm{background:var(--blue);border:none;color:#fff;padding:9px 20px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex:1;}
    .btn-sch-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:9px 16px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
    /* image panel in editor */
    .img-row{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .btn-gen-img{background:var(--navy-light);border:1px solid var(--border);color:var(--white);padding:6px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .btn-gen-img:hover{background:var(--blue);border-color:var(--blue);}
    .btn-gen-img:disabled{opacity:0.4;cursor:not-allowed;}
    .gen-img-preview{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:none;}
    .img-dl-link{font-size:11px;color:var(--blue-bright);text-decoration:none;display:none;}
    /* topic reasoning badge */
    .reason-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
    .reason-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
    .reason-tag.intent{background:rgba(59,130,246,0.12);color:var(--blue-bright);border:1px solid rgba(59,130,246,0.2);}
    .reason-tag.comp.low{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.2);}
    .reason-tag.comp.medium{background:rgba(245,158,11,0.12);color:var(--warning);border:1px solid rgba(245,158,11,0.2);}
    .reason-tag.comp.high{background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
    .reason-tag.score{background:rgba(168,85,247,0.12);color:#c084fc;border:1px solid rgba(168,85,247,0.2);}
    .reason-tip{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
    /* scheduled badge */
    .sch-badge{font-size:10px;font-weight:700;background:rgba(245,158,11,0.12);color:var(--warning);border:1px solid rgba(245,158,11,0.25);padding:2px 7px;border-radius:4px;}
    /* ── MOBILE ── */
    .mob-nav{display:none;}
    .sidebar-handle{display:none;}
    @media(max-width:768px){
      html,body{height:100%;overflow:hidden;}
      header{padding:10px 12px;gap:6px;flex-wrap:nowrap;}
      .logo{font-size:13px;}
      .hdr-field{font-size:12px;padding:6px 9px;}
      .hdr-field.w200,.hdr-field.w150{width:100px;}
      .btn-sm{padding:6px 10px;font-size:12px;}
      .tag{font-size:10px;padding:2px 8px;}
      /* Full screen app */
      .app{height:calc(100vh - 46px);flex-direction:row;}
      /* Sidebar: hidden off-screen bottom drawer */
      .sidebar{
        position:fixed;bottom:0;left:0;right:0;
        width:100% !important;
        height:70vh;
        z-index:400;
        background:var(--navy-mid);
        border-top:1px solid rgba(59,130,246,0.3);
        border-radius:20px 20px 0 0;
        transform:translateY(100%);
        transition:transform 0.28s ease;
        flex-direction:column;
        display:flex !important;
        overflow:hidden;
      }
      .sidebar.open{transform:translateY(0) !important;}
      .sidebar-handle{
        display:block;
        width:40px;height:4px;
        background:rgba(255,255,255,0.2);
        border-radius:2px;
        margin:12px auto 0;
        flex-shrink:0;
        cursor:pointer;
      }
      /* Editor full screen */
      .editor{flex:1;width:100%;overflow:hidden;}
      .editor-toolbar{padding:8px 10px;gap:4px;flex-wrap:wrap;}
      .editor-title{font-size:11px;width:100%;order:-1;white-space:normal;line-height:1.3;}
      .editor-tabs{gap:3px;}
      .etab{padding:4px 8px;font-size:11px;}
      .editor-actions{display:flex;gap:4px;width:100%;}
      .btn-dl,.btn-publish,.btn-sm{
        flex:1;padding:8px 6px;font-size:11px;
        text-align:center;min-height:36px;
      }
      .editor-body{flex:1;overflow-y:auto;padding-bottom:56px;}
      .preview-wrap{padding:16px 14px;}
      .preview-wrap h1{font-size:18px;margin-bottom:12px;}
      .preview-wrap h2{font-size:16px;margin:22px 0 7px;}
      .preview-wrap h3{font-size:14px;}
      .preview-wrap p,.preview-wrap li{font-size:13px;}
      .source-pre{font-size:10px;}
      /* Bottom nav */
      .mob-nav{
        display:flex;
        position:fixed;bottom:0;left:0;right:0;
        height:52px;
        background:rgba(10,22,40,0.98);
        border-top:1px solid var(--border);
        z-index:300;
        padding:0;
        margin:0;
      }
      .mob-nav-btn{
        flex:1;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        gap:2px;
        background:none;border:none;
        color:var(--muted);
        font-family:'DM Sans',sans-serif;
        font-size:9px;font-weight:600;
        cursor:pointer;
        padding:4px 0;
        min-width:0;
      }
      .mob-nav-btn.active{color:var(--blue-bright);}
      .mob-nav-btn svg{width:16px;height:16px;flex-shrink:0;}
      /* Sidebar tabs hidden on mobile (nav handles it) */
      .sidebar-tabs{display:none;}
      /* Topic items */
      .topic-search-bar{padding:8px 10px;gap:6px;}
      .topic-input{font-size:12px;padding:6px 10px;}
      .btn-fetch{padding:6px 10px;font-size:12px;}
      .topics-list{padding:6px;overflow-y:auto;flex:1;}
      .topic-item{padding:10px 11px;margin-bottom:6px;}
      .topic-item-title{font-size:12px;}
      .btn-write{padding:5px 11px;font-size:11px;}
      /* SEO panel */
      .seo-score-num{font-size:22px;}
      .seo-item-label{font-size:11px;}
      .seo-item-val{font-size:10px;}
      .seo-fix-btn{font-size:9px;padding:2px 6px;}
      /* Schedule modal */
      .sch-box{margin:16px;border-radius:16px;}
      /* Empty/gen states */
      .empty-state{padding-bottom:60px;}
      .gen-state{padding-bottom:60px;}
      /* Overlay when sidebar open */
      .sidebar-overlay{display:block !important;}
    }
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:390;}
  </style>
</head>
<body>
<header>
  <div class="logo">Vortex<span>Labs</span> Blog Generator</div>
  <div class="hdr-sep"></div>
  <input type="password" class="hdr-field w200" id="openaiKey" placeholder="OpenAI key (sk-...)" />
  <input type="password" class="hdr-field w150" id="githubPat" placeholder="GitHub PAT" />
  <button class="btn-sm" onclick="saveKeys()">Save Keys</button>
  <span class="tag missing" id="keyStatus">No keys</span>
</header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-handle" onclick="closeSidebar()"></div>
    <div class="sidebar-tabs">
      <button class="stab active" id="tabTopics" onclick="switchTab('topics')">Topics</button>
      <button class="stab" id="tabPrompt" onclick="switchTab('prompt')">Prompt</button>
      <button class="stab" id="tabSeo" onclick="switchTab('seo')">SEO Audit</button>
    </div>
    <div class="topics-panel" id="topicsPanel">
      <div class="topic-search-bar">
        <input type="text" class="topic-input" id="customInput" placeholder="Custom topic (optional)..." />

function markdownToHTML(md){
  const MID_CTA=`<div class="mid-cta"><div class="mid-cta-inner"><div class="mid-cta-text"><strong>Want to track all this in one view?</strong><span>The free Meta Ads Dashboard gives you ROAS, CPL, spend and campaign performance at a glance. No $50/month tools. No tab-switching.</span></div><a href="${LANDING_PAGE}" class="mid-cta-btn" target="_blank">Get Free Dashboard</a></div></div>`;

  // Parse markdown tables first
  function parseTables(text){
    return text.replace(/((^\|.+\|\s*\n)(^\|[-| :]+\|\s*\n)(^\|.+\|\s*\n?)+)/gm, tableBlock=>{
      const rows=tableBlock.trim().split('\n').filter(r=>r.trim());
      const isSeperator=r=>/^\|[-| :]+\|$/.test(r.trim());
      let html='<div class="tbl-wrap"><table>';
      let inHead=true;
      rows.forEach(row=>{
        if(isSeperator(row)){inHead=false;return;}
        const cells=row.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
        if(inHead){
          html+='<thead><tr>'+cells.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
          inHead=false;
        } else {
          html+='<tr>'+cells.map(c=>`<td>${c}</td>`).join('')+'</tr>';
        }
      });
      html+='</tbody></table></div>';
      return html;
    });
  }

  // Split into table blocks and non-table blocks, process separately
  const TABLE_RE=/((?:^\|.+\|\s*\n){3,})/gm;
  const segments=[];
  let last=0,m;
  const src=md+'\n';
  while((m=TABLE_RE.exec(src))!==null){
    if(m.index>last)segments.push({type:'text',content:src.slice(last,m.index)});
    segments.push({type:'table',content:m[0]});
    last=m.index+m[0].length;
  }
  if(last<src.length)segments.push({type:'text',content:src.slice(last)});

  function processText(text){
    return text
      .replace(/^# .+$/gm,'') // strip H1 -- title already in hero
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--blue-bright);text-decoration:underline;">$1</a>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g,x=>`<ul>${x}</ul>`)
      .split('\n')
      .map(line=>{
        line=line.trim();if(!line)return '';
        if(/^<(h[23]|ul|li|table|thead|tbody|tr|th|td|div)/.test(line))return line;
        return `<p>${line}</p>`;
      }).filter(Boolean).join('\n');
  }

  const processed=segments.map(s=>{
    if(s.type==='table')return parseTables(s.content);
    return processText(s.content);
  }).join('\n');

  // Inject mid-article CTA after 3rd H2
  const lines=processed.split('\n');
  let h2count=0;const out=[];
  for(const line of lines){
    out.push(line);
    if(line.startsWith('<h2>')){h2count++;if(h2count===3)out.push(MID_CTA);}
  }
  return out.join('\n');
}

7. Reader is a performance marketer obsessed with ROAS and cutting wasted ad spend -- write to that greed
8. Every section should make the reader feel they are losing money by not acting
9. Keep all good content from the original -- only add/fix, do not remove working sections`;

  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model:'gpt-4o',max_tokens:4500,temperature:0.7,

async function publishToGitHub(silent=false){

  if(!currentPost)return;
  const btn=document.getElementById('publishBtn');if(!silent){btn.disabled=true;btn.textContent='Publishing...';}

  const GH_HEADERS={'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'};

  try{
    // 1. Publish blog post
    btn.textContent='Publishing post...';
    const postPath=`${GH_FOLDER}/${currentPost.slug}.html`;
    const postUrl=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${postPath}`;
    const postContent=btoa(unescape(encodeURIComponent(currentPost.html)));
    let postSha=null;
    const postCheck=await fetch(postUrl,{headers:GH_HEADERS});
    if(postCheck.ok){const ex=await postCheck.json();postSha=ex.sha;}
    const postRes=await fetch(postUrl,{method:'PUT',headers:GH_HEADERS,body:JSON.stringify({message:`Add blog: ${currentPost.topic.title}`,content:postContent,branch:GH_BRANCH,...(postSha?{sha:postSha}:{})})});

    // 2. Update sitemap.xml
    btn.textContent='Updating sitemap...';
    const sitemapPath='sitemap.xml';
    const sitemapUrl=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${sitemapPath}`;
    const newPostUrl=`https://vortexlabs.app/blogs/${currentPost.slug}.html`;
    const today=new Date().toISOString().split('T')[0];
    let sitemapSha=null;
    let existingUrls=[];

    const sitemapCheck=await fetch(sitemapUrl,{headers:GH_HEADERS});
    if(sitemapCheck.ok){
      const sitemapData=await sitemapCheck.json();
      sitemapSha=sitemapData.sha;
      const decoded=decodeURIComponent(escape(atob(sitemapData.content.replace(/\n/g,''))));
      // Extract existing <loc> URLs
      const matches=decoded.match(/<loc>(.*?)<\/loc>/g)||[];
      existingUrls=matches.map(m=>m.replace(/<\/?loc>/g,''));

    const sitemapXml=`<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
${existingUrls.map(u=>`  <url>

    <lastmod>${today}</lastmod>

    <priority>${u===landingUrl?'1.0':u.includes('/blogs/')?'0.8':'0.7'}</priority>
  </url>`).join('\n')}
</urlset>`;

  const ts=new Date(val).getTime();
  if(ts<=Date.now()){toast('Pick a future time','error');return;}
  const jobs=getScheduledJobs();

  localStorage.setItem('vl_scheduled',JSON.stringify(jobs));
  closeSchedule();
  renderTopics();
  toast(`Scheduled for ${new Date(ts).toLocaleString()}`,'success');
}
function getScheduledJobs(){try{return JSON.parse(localStorage.getItem('vl_scheduled')||'{}')}catch(e){return {};}}
function cancelSchedule(slug){const j=getScheduledJobs();delete j[slug];localStorage.setItem('vl_scheduled',JSON.stringify(j));renderTopics();toast('Schedule cancelled','info');}

// Background scheduler -- checks every 60s
setInterval(async()=>{
  const jobs=getScheduledJobs();
  const now=Date.now();
  for(const slug of Object.keys(jobs)){
    const job=jobs[slug];
    if(job.ts<=now){
      const pat=localStorage.getItem('vl_github');
      if(!pat)continue;
      // restore currentPost temporarily for publish
      const saved=currentPost;
      currentPost={slug:job.slug,topic:job.topic,html:job.html,seoMeta:job.seoMeta,md:job.md};
      await publishToGitHub(true);
      currentPost=saved;
      delete jobs[slug];
      localStorage.setItem('vl_scheduled',JSON.stringify(jobs));
      renderTopics();
      toast(`Auto-published: ${job.slug}`,'success');
    }
  }
},60000);

}

function escHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type='info'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast show ${type}`;setTimeout(()=>{el.className='toast';},3000);}

// ── MOBILE NAV ───────────────────────────────────────────────────────────────
function isMobile(){return window.innerWidth<=768;}
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  const ov=document.getElementById('sidebarOverlay');
  if(ov)ov.style.display='block';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  const ov=document.getElementById('sidebarOverlay');
  if(ov)ov.style.display='none';
}
function mobNav(tab){
  ['editor','topics','prompt','seo'].forEach(t=>{
    const b=document.getElementById('mbn-'+t);
    if(b)b.classList.toggle('active',t===tab);
  });
  if(tab==='editor'){
    closeSidebar();
    return;
  }
  openSidebar();
  switchTab(tab==='topics'?'topics':tab==='prompt'?'prompt':'seo');
}
// Close sidebar when tapping outside
document.addEventListener('click',e=>{
  if(!isMobile())return;
  const sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.mob-nav')){
    closeSidebar();
  }
});
// Touch swipe down on sidebar handle to close
(()=>{
  let startY=0;
  document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    const diff=e.changedTouches[0].clientY-startY;
    if(diff>60&&isMobile()){closeSidebar();}
  },{passive:true});
})();
</script>
