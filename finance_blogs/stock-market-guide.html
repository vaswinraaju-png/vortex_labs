<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vortex Labs SEO Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14171A; --bg-soft: #1D2125; --bg-softer: #242830;
    --text: #F2EFE9; --text-dim: #B8B5AE; --line: #2D3137;
    --green: #2E8B57; --green-bright: #3FAE71; --red: #B5483D; --gold: #C9A24B;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
  .font-display { font-family: 'Lora', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  textarea, input, select { font-family: inherit; }
  .btn { padding: .6rem 1.1rem; border-radius: .5rem; font-weight: 600; font-size: .875rem; cursor: pointer; border: 1px solid var(--line); background: var(--bg-softer); color: var(--text); }
  .btn:hover { border-color: var(--gold); }
  .btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-bright); border-color: var(--green-bright); }
  .btn-ghost { background: transparent; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .pill { font-family: 'JetBrains Mono', monospace; font-size: .7rem; padding: .15rem .5rem; border-radius: 999px; border: 1px solid var(--line); }
  .score-high { color: var(--green-bright); border-color: var(--green-bright); }
  .score-mid { color: var(--gold); border-color: var(--gold); }
  .score-low { color: var(--red); border-color: var(--red); }
  .topic-row { border-bottom: 1px solid var(--line); cursor: pointer; }
  .topic-row:hover { background: var(--bg-softer); }
  .topic-row.active { background: var(--bg-softer); border-left: 2px solid var(--gold); }
  .tab { padding: .5rem 1rem; font-size: .875rem; font-weight: 600; color: var(--text-dim); border-bottom: 2px solid transparent; cursor: pointer; }
  .tab.active { color: var(--text); border-color: var(--gold); }
  .audit-row { display: flex; justify-content: space-between; align-items: center; padding: .65rem 0; border-bottom: 1px solid var(--line); font-size: .85rem; }
  .audit-pass { color: var(--green-bright); }
  .audit-fail { color: var(--red); }
  .toast { position: fixed; bottom: 1.25rem; right: 1.25rem; background: var(--bg-softer); border: 1px solid var(--line); padding: .75rem 1.1rem; border-radius: .5rem; font-size: .85rem; z-index: 100; max-width: 360px; }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green-bright); color: var(--green-bright); }
  details > summary { cursor: pointer; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .editor-frame { background: #fff; color: #111; border-radius: .5rem; overflow: hidden; }
  .focus-ring:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
</style>
</head>
<body>

<div id="app" class="h-screen flex flex-col">

  <!-- TOP BAR -->
  <header class="flex items-center justify-between px-5 py-3 border-b" style="border-color: var(--line); background: var(--bg-soft);">
    <div class="flex items-center gap-3">
      <span class="font-mono text-xs px-2 py-1 rounded" style="background: var(--green); color:#fff;">VX</span>
      <h1 class="font-display text-lg">Vortex Labs SEO Agent</h1>
      <select id="profile-select" class="font-mono text-xs px-2 py-1.5 rounded focus-ring" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);">
        <option value="labs">Vortex Labs</option>
        <option value="finance">Vortex Finance</option>
      </select>
      <span class="pill" id="repo-pill" style="color: var(--text-dim);">vaswinraaju-png/vortex_labs</span>
      <span class="pill" id="path-pill" style="color: var(--gold); border-color: var(--gold);">blogs/</span>
    </div>
    <div class="flex items-center gap-2">
      <span id="status-pill" class="pill" style="color: var(--text-dim);">Not configured</span>
      <button class="btn btn-ghost" id="open-settings">⚙ Settings</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- LEFT: TOPICS -->
    <aside class="w-80 flex flex-col border-r overflow-hidden" style="border-color: var(--line); background: var(--bg-soft);">
      <div class="p-4 flex items-center justify-between border-b" style="border-color: var(--line);">
        <h2 class="font-semibold text-sm">Topics</h2>
        <button class="btn btn-ghost text-xs" id="refresh-topics">↻ Discover</button>
      </div>
      <div id="topic-list" class="flex-1 overflow-y-auto"></div>
      <div class="p-3 border-t" style="border-color: var(--line);">
        <button class="btn w-full text-xs" id="add-topic-btn">+ Custom topic</button>
      </div>
    </aside>

    <!-- CENTER: EDITOR -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <div class="flex border-b px-4" style="border-color: var(--line);">
        <div class="tab active" data-tab="write">Write</div>
        <div class="tab" data-tab="audit">SEO Audit</div>
        <div class="tab" data-tab="publish">Publish</div>
      </div>

      <div class="flex-1 overflow-y-auto p-6">

        <!-- WRITE TAB -->
        <div id="tab-write">
          <div class="mb-4">
            <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">SELECTED TOPIC</label>
            <input id="current-topic" class="w-full p-3 rounded" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" placeholder="Pick a topic from the left, or type your own…" />
          </div>
          <div class="flex gap-3 mb-6">
            <button class="btn btn-primary" id="generate-btn">✦ Generate article</button>
            <span id="gen-status" class="text-xs self-center font-mono" style="color: var(--text-dim);"></span>
          </div>
          <div>
            <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">GENERATED HTML</label>
            <textarea id="article-html" class="w-full rounded p-4 font-mono text-xs" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text); min-height: 420px;" placeholder="Generated post HTML will appear here. You can edit it directly before publishing."></textarea>
          </div>
        </div>

        <!-- AUDIT TAB -->
        <div id="tab-audit" class="hidden">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-display text-lg">SEO Audit</h3>
            <div class="flex gap-2">
              <button class="btn text-xs" id="run-audit-btn">Run audit</button>
              <button class="btn btn-primary text-xs" id="auto-optimize-btn">Auto-optimize all</button>
            </div>
          </div>
          <div id="audit-score" class="mb-4 font-mono text-2xl"></div>
          <div id="audit-list"></div>
        </div>

        <!-- PUBLISH TAB -->
        <div id="tab-publish" class="hidden">
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">FILENAME</label>
              <input id="publish-filename" class="w-full p-3 rounded font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" placeholder="candlestick-patterns-beginners.html" />
            </div>
            <div>
              <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">PATH</label>
              <input id="publish-path" class="w-full p-3 rounded font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="blogs/" />
            </div>
          </div>
          <div class="flex items-center gap-3 mb-6">
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="rebuild-sitemap" checked /> Rebuild sitemap.xml</label>
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="rebuild-index" checked /> Add card to index.html</label>
          </div>
          <div class="flex items-center gap-3 mb-6">
            <label class="text-sm" style="color: var(--text-dim);">Schedule:</label>
            <input type="datetime-local" id="schedule-time" class="p-2 rounded font-mono text-xs" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" />
            <button class="btn text-xs" id="schedule-btn">Schedule</button>
          </div>
          <button class="btn btn-primary" id="publish-now-btn">⬆ Publish now</button>
          <div id="publish-log" class="mt-6 font-mono text-xs space-y-1"></div>
        </div>

      </div>
    </main>

    <!-- RIGHT: SETTINGS / HISTORY -->
    <aside class="w-80 border-l overflow-y-auto" style="border-color: var(--line); background: var(--bg-soft);" id="right-panel">
      <div class="p-4">
        <h2 class="font-semibold text-sm mb-3">History</h2>
        <div id="history-list" class="space-y-2 text-xs"></div>
      </div>
    </aside>

  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background: rgba(0,0,0,.6);">
  <div class="rounded-lg p-6 w-[480px] max-h-[85vh] overflow-y-auto" style="background: var(--bg-soft); border: 1px solid var(--line);">
    <h2 class="font-display text-xl mb-4">Settings</h2>

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">OPENAI API KEY</label>
    <input id="set-openai-key" type="password" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" placeholder="sk-..." />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">GITHUB PERSONAL ACCESS TOKEN</label>
    <input id="set-gh-token" type="password" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" placeholder="ghp_..." />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">REPO (owner/name)</label>
    <input id="set-repo" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="vaswinraaju-png/vortex_labs" />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">BRANCH</label>
    <input id="set-branch" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="main" />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">DOMAIN</label>
    <input id="set-domain" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="vortexlabs.app" />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">PRODUCT CTA URL</label>
    <input id="set-cta-url" class="w-full p-2.5 rounded mb-3 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="/stock-market-guide.html" />

    <label class="block text-xs font-mono mb-1" style="color: var(--text-dim);">PRODUCT NAME (for CTAs)</label>
    <input id="set-product-name" class="w-full p-2.5 rounded mb-4 font-mono text-sm" style="background: var(--bg-softer); border: 1px solid var(--line); color: var(--text);" value="The ₹1 Lakh Trader Blueprint" />

    <div class="flex justify-end gap-2">
      <button class="btn btn-ghost" id="settings-cancel">Cancel</button>
      <button class="btn btn-primary" id="settings-save">Save settings</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- STATE ---------- */
  const LS_KEY = "vx_seo_agent_settings_v1";
  const HIST_KEY = "vx_seo_agent_history_v1";
  const SCHED_KEY = "vx_seo_agent_scheduled_v1";

  function loadSettings(){
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ return {}; }
  }
  function saveSettings(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }
  let settings = loadSettings();

  function loadHistory(){
    try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e){ return []; }
  }
  function saveHistory(h){ localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(0,50))); }

  /* ---------- SITE PROFILES ---------- */
  const PROFILES = {
    labs: {
      label: "Vortex Labs",
      pathPrefix: "blogs/",
      ctaUrl: "/contact.html",
      productName: "Vortex Labs",
      domain: "vortexlabs.app",
      sitePrompt: "You write SEO-optimised blog posts for Vortex Labs, a performance marketing agency running Meta, Google, and TikTok ads for e-commerce, SaaS, and D2C brands.",
      ctaContext: "the next step is booking a free growth audit, not a specific product purchase"
    },
    finance: {
      label: "Vortex Finance",
      pathPrefix: "finance-blogs/",
      ctaUrl: "/stock-market-guide.html",
      productName: "The ₹1 Lakh Trader Blueprint",
      domain: "vortexlabs.app",
      sitePrompt: "You write SEO-optimised blog posts for Vortex Finance, a section of Vortex Labs teaching beginner price-action and chart-pattern trading to Indian retail traders.",
      ctaContext: "the next step is buying the linked beginner trading ebook"
    }
  };
  let activeProfile = "finance";

  /* ---------- SEED TOPICS (two profile-specific sets) ---------- */
  const SEED_TOPICS_FINANCE = [
    { title: "Candlestick Patterns Every Beginner Should Know", bucket: "Candlesticks", score: 92 },
    { title: "How to Draw Support and Resistance Without Guessing", bucket: "Chart Structure", score: 89 },
    { title: "Why Your Stop Loss Keeps Getting Hit", bucket: "Risk Management", score: 87 },
    { title: "Doji, Hammer, Engulfing: What These Candles Actually Mean", bucket: "Candlesticks", score: 85 },
    { title: "Trading vs Investing: Which One Actually Fits Your Life", bucket: "Fundamentals", score: 83 },
    { title: "5 Chart Patterns That Predict Breakouts (With Examples)", bucket: "Chart Patterns", score: 90 },
    { title: "Why Telegram Trading Tips Don't Work Long Term", bucket: "Mindset", score: 88 },
    { title: "Multi-Timeframe Analysis Explained for Beginners", bucket: "Chart Structure", score: 78 },
    { title: "Higher Highs and Higher Lows: Reading Market Structure", bucket: "Chart Structure", score: 81 },
    { title: "Common Beginner Mistakes in Price Action Trading", bucket: "Mindset", score: 86 },
    { title: "What Is a Breakout and How to Trade It Safely", bucket: "Chart Patterns", score: 84 },
    { title: "Risk-Reward Ratio: The Math Most Beginners Skip", bucket: "Risk Management", score: 82 },
    { title: "IPO vs FPO: What's the Difference and Why It Matters", bucket: "Fundamentals", score: 70 },
    { title: "How to Start a Trading Journal (Free Template Inside)", bucket: "Tools", score: 75 },
    { title: "Bullish vs Bearish Patterns: A Visual Beginner's Guide", bucket: "Candlesticks", score: 80 },
    { title: "Order Types Explained: Market, Limit, Stop Loss", bucket: "Fundamentals", score: 73 },
    { title: "Trend Reversal Signals You're Probably Missing", bucket: "Chart Patterns", score: 79 },
    { title: "Market Psychology: Why Prices Move the Way They Do", bucket: "Mindset", score: 77 },
    { title: "Indecision Candles: What a Doji Is Really Telling You", bucket: "Candlesticks", score: 74 },
    { title: "Trading Terminology Every Beginner Must Know", bucket: "Fundamentals", score: 71 },
  ];

  const SEED_TOPICS_LABS = [
    { title: "Why Your Meta Ads CAC Keeps Climbing (And How to Fix It)", bucket: "Paid Social", score: 91 },
    { title: "Google Performance Max: What Actually Moves the Needle", bucket: "Google Ads", score: 88 },
    { title: "How to Brief a UGC Creator for Performance, Not Just Vibes", bucket: "Creative", score: 84 },
    { title: "Landing Page CRO Checklist Before You Scale Ad Spend", bucket: "CRO", score: 89 },
    { title: "TikTok Ads for D2C: What Actually Converts in 2026", bucket: "Paid Social", score: 86 },
    { title: "Attribution Modeling Explained for Non-Technical Founders", bucket: "Analytics", score: 78 },
    { title: "When to Fire Your Ad Agency (Signs You're Being Milked)", bucket: "Strategy", score: 90 },
    { title: "Email and SMS Flows That Actually Reduce CAC Payback", bucket: "Retention", score: 80 },
    { title: "How Much Should You Actually Spend on Ads at $0 Revenue", bucket: "Strategy", score: 83 },
    { title: "Creative Testing Frameworks That Don't Waste Budget", bucket: "Creative", score: 85 },
    { title: "ROAS vs Profit: Why Your 'Good' ROAS Might Be Losing Money", bucket: "Analytics", score: 87 },
    { title: "Funnel Architecture for Lead Gen vs E-Commerce", bucket: "Strategy", score: 76 },
  ];

  function getActiveProfile(){ return PROFILES[activeProfile]; }
  function getSeedTopics(){ return activeProfile === "finance" ? SEED_TOPICS_FINANCE : SEED_TOPICS_LABS; }

  /* ---------- UTILITIES ---------- */
  function toast(msg, type){
    const t = document.createElement("div");
    t.className = "toast" + (type ? " " + type : "");
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 5000);
  }

  function scoreClass(score){
    if (score >= 85) return "score-high";
    if (score >= 70) return "score-mid";
    return "score-low";
  }

  function slugify(str){
    return str.toLowerCase()
      .replace(/[^a-z0-9\s-]/g, "")
      .trim()
      .replace(/\s+/g, "-")
      .slice(0, 60);
  }

  /* ---------- RENDER TOPICS ---------- */
  let topics = getSeedTopics().slice();
  let activeTopicIdx = null;

  function renderTopics(){
    const list = document.getElementById("topic-list");
    list.innerHTML = "";
    topics.forEach((t, i) => {
      const row = document.createElement("div");
      row.className = "topic-row p-3" + (i === activeTopicIdx ? " active" : "");
      row.innerHTML = `
        <div class="flex justify-between items-start gap-2 mb-1">
          <span class="text-sm leading-snug">${t.title}</span>
          <span class="pill ${scoreClass(t.score)} shrink-0">${t.score}</span>
        </div>
        <span class="font-mono text-xs" style="color: var(--text-dim);">${t.bucket}</span>
      `;
      row.addEventListener("click", () => {
        activeTopicIdx = i;
        document.getElementById("current-topic").value = t.title;
        renderTopics();
      });
      list.appendChild(row);
    });
  }
  renderTopics();

  function applyProfileToUI(){
    const profile = getActiveProfile();
    document.getElementById("path-pill").textContent = profile.pathPrefix;
    document.getElementById("publish-path").value = profile.pathPrefix;
    topics = getSeedTopics().slice();
    activeTopicIdx = null;
    document.getElementById("current-topic").value = "";
    renderTopics();
  }
  applyProfileToUI();

  document.getElementById("profile-select").addEventListener("change", (e) => {
    activeProfile = e.target.value;
    applyProfileToUI();
    toast("Switched to " + getActiveProfile().label + " (" + getActiveProfile().pathPrefix + ")", "success");
  });

  document.getElementById("add-topic-btn").addEventListener("click", () => {
    const title = prompt("Custom topic title:");
    if (title && title.trim()) {
      topics.unshift({ title: title.trim(), bucket: "Custom", score: 75 });
      activeTopicIdx = 0;
      document.getElementById("current-topic").value = title.trim();
      renderTopics();
    }
  });

  document.getElementById("refresh-topics").addEventListener("click", async () => {
    if (!settings.openaiKey) { toast("Add your OpenAI key in Settings first.", "error"); return; }
    const btn = document.getElementById("refresh-topics");
    btn.disabled = true; btn.textContent = "↻ Discovering…";
    try {
      const profile = getActiveProfile();
      const res = await callOpenAI([
        { role: "system", content: profile.sitePrompt + " Return ONLY a JSON array of 8 objects, each with keys: title (string, a realistic blog post topic someone in this audience would search for), bucket (a short 1-3 word content category string), score (integer 60-99 estimating search intent and conversion potential, where " + profile.ctaContext + "). No prose, no markdown fences, just the JSON array." },
        { role: "user", content: "Generate 8 fresh topic ideas, avoiding generic titles. Focus on long-tail, specific angles this audience would actually type into Google." }
      ], { temperature: 0.9 });
      const text = res.trim().replace(/^```json/, "").replace(/^```/, "").replace(/```$/, "").trim();
      const fresh = JSON.parse(text);
      topics = fresh.concat(topics);
      renderTopics();
      toast("Discovered " + fresh.length + " new topics.", "success");
    } catch(e) {
      toast("Topic discovery failed: " + e.message, "error");
    } finally {
      btn.disabled = false; btn.textContent = "↻ Discover";
    }
  });

  /* ---------- OPENAI CALL ---------- */
  async function callOpenAI(messages, opts){
    opts = opts || {};
    if (!settings.openaiKey) throw new Error("No OpenAI API key configured.");
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + settings.openaiKey
      },
      body: JSON.stringify({
        model: opts.model || "gpt-4o",
        messages: messages,
        temperature: opts.temperature != null ? opts.temperature : 0.7,
        max_tokens: opts.maxTokens || 4000
      })
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error("OpenAI API error " + res.status + ": " + errBody.slice(0,200));
    }
    const data = await res.json();
    return data.choices[0].message.content;
  }

  /* ---------- ARTICLE TEMPLATE / SYSTEM PROMPT ---------- */
  function buildSystemPrompt(){
    const profile = getActiveProfile();
    const cta = profile.ctaUrl;
    const product = profile.productName;
    return `${profile.sitePrompt}

STRICT RULES:
- Output ONLY a complete <article>...</article> HTML fragment. No <html>, <head>, <body> tags. No markdown. No code fences.
- Use real semantic HTML: <h1> once, <h2> for sections, <h3> if needed, <p>, <ul>/<li>, <table> where useful, <details><summary> for FAQ items.
- Short paragraphs: max 3 sentences each.
- No em dashes. Use periods or commas instead.
- Every H2 section must deliver one concrete, actionable takeaway, not vague encouragement.
- Include a real FAQ section near the end with at least 4 <details><summary>question</summary><p>answer</p></details> blocks with genuinely useful answers.
- Include exactly one mid-article callout box as <div class="callout"><p>...</p></div> that naturally mentions "${product}" and links to "${cta}" as the next step for the reader. Do not oversell; one sentence framing it as the natural next step.
- Include one closing CTA paragraph near the end, also linking to "${cta}", styled as <p class="cta-line">...</p>.
- Target length: 1200-1700 words.
- Write in plain, confident, non-hypey language. No "unlock", "game-changer", "secret", or other hype words.
- Assume zero prior trading knowledge unless the topic says otherwise.
- 2026 dates only if any date is referenced.
- Do not invent specific statistics, percentages, or named studies. If illustrating a concept numerically, use clearly hypothetical framing (e.g. "Imagine a stock moves from ₹100 to ₹110").`;
  }

  /* ---------- GENERATE ARTICLE ---------- */
  document.getElementById("generate-btn").addEventListener("click", async () => {
    const topic = document.getElementById("current-topic").value.trim();
    if (!topic) { toast("Pick or type a topic first.", "error"); return; }
    if (!settings.openaiKey) { toast("Add your OpenAI key in Settings first.", "error"); return; }

    const btn = document.getElementById("generate-btn");
    const status = document.getElementById("gen-status");
    btn.disabled = true;
    status.textContent = "Writing…";

    try {
      const html = await callOpenAI([
        { role: "system", content: buildSystemPrompt() },
        { role: "user", content: "Write the article for this topic: \"" + topic + "\"" }
      ], { temperature: 0.7, maxTokens: 3500 });

      const cleaned = html.trim().replace(/^```html/, "").replace(/^```/, "").replace(/```$/, "").trim();
      document.getElementById("article-html").value = cleaned;
      document.getElementById("publish-filename").value = slugify(topic) + ".html";
      status.textContent = "Done.";
      toast("Article generated. Review it, then run the SEO audit.", "success");
    } catch(e) {
      status.textContent = "Failed.";
      toast("Generation failed: " + e.message, "error");
    } finally {
      btn.disabled = false;
    }
  });

  /* ---------- TABS ---------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      ["write","audit","publish"].forEach(name => {
        document.getElementById("tab-" + name).classList.toggle("hidden", name !== tab.dataset.tab);
      });
    });
  });

  /* ---------- SEO AUDIT ---------- */
  const AUDIT_CHECKS = [
    { id: "h1count", label: "Exactly one <h1>", check: html => (html.match(/<h1[\s>]/gi)||[]).length === 1 },
    { id: "h2count", label: "At least 4 <h2> sections", check: html => (html.match(/<h2[\s>]/gi)||[]).length >= 4 },
    { id: "wordcount", label: "1200-1700 words", check: html => {
        const text = html.replace(/<[^>]+>/g, " ");
        const words = text.split(/\s+/).filter(Boolean).length;
        return words >= 1100 && words <= 1900;
      } },
    { id: "faq", label: "At least 4 FAQ <details> blocks", check: html => (html.match(/<details/gi)||[]).length >= 4 },
    { id: "callout", label: "Has mid-article callout linking to CTA", check: html => html.includes('class="callout"') && html.includes(getActiveProfile().ctaUrl) },
    { id: "cta", label: "Has closing CTA line", check: html => html.includes('class="cta-line"') },
    { id: "shortparas", label: "No paragraph longer than ~4 sentences", check: html => {
        const paras = html.match(/<p[^>]*>(.*?)<\/p>/gis) || [];
        return paras.every(p => (p.match(/[.!?]/g)||[]).length <= 5);
      } },
    { id: "noemdash", label: "No em dashes", check: html => !html.includes("—") && !html.includes("&mdash;") },
    { id: "nohype", label: "No hype words (unlock, secret, game-changer)", check: html => !/unlock|secret|game-changer/i.test(html) },
    { id: "links", label: "Has at least one real <a href> link", check: html => /<a\s+[^>]*href=/i.test(html) },
    { id: "lists", label: "Uses at least one list (<ul> or <table>)", check: html => /<ul[\s>]/i.test(html) || /<table[\s>]/i.test(html) },
    { id: "title-len", label: "Title implied by H1 is reasonable length", check: html => {
        const m = html.match(/<h1[^>]*>(.*?)<\/h1>/is);
        if (!m) return false;
        const len = m[1].replace(/<[^>]+>/g,"").length;
        return len >= 20 && len <= 90;
      } },
  ];

  let lastAuditResults = [];

  function runAudit(){
    const html = document.getElementById("article-html").value;
    if (!html.trim()) { toast("Generate or paste an article first.", "error"); return; }
    lastAuditResults = AUDIT_CHECKS.map(c => ({ ...c, pass: c.check(html) }));
    renderAudit();
  }

  function renderAudit(){
    const passCount = lastAuditResults.filter(r => r.pass).length;
    const total = lastAuditResults.length;
    const scoreEl = document.getElementById("audit-score");
    scoreEl.innerHTML = `<span class="${passCount === total ? 'audit-pass' : passCount/total >= 0.7 ? '' : 'audit-fail'}" style="color: ${passCount===total ? 'var(--green-bright)' : passCount/total>=0.7 ? 'var(--gold)' : 'var(--red)'};">${passCount} / ${total} checks passed</span>`;
    const list = document.getElementById("audit-list");
    list.innerHTML = "";
    lastAuditResults.forEach(r => {
      const row = document.createElement("div");
      row.className = "audit-row";
      row.innerHTML = `
        <span>${r.pass ? "✓" : "✕"} ${r.label}</span>
        ${r.pass ? "" : '<button class="btn text-xs fix-btn" data-id="'+r.id+'">Fix</button>'}
      `;
      row.querySelector(".audit-pass, span").style.color = r.pass ? "var(--green-bright)" : "var(--red)";
      list.appendChild(row);
    });
    list.querySelectorAll(".fix-btn").forEach(btn => {
      btn.addEventListener("click", () => fixIssue(btn.dataset.id));
    });
  }

  document.getElementById("run-audit-btn").addEventListener("click", runAudit);

  async function fixIssue(id){
    const html = document.getElementById("article-html").value;
    if (!settings.openaiKey) { toast("Add your OpenAI key in Settings first.", "error"); return; }
    const check = AUDIT_CHECKS.find(c => c.id === id);
    toast("Fixing: " + check.label + "…");
    try {
      const fixed = await callOpenAI([
        { role: "system", content: buildSystemPrompt() + "\n\nYou are editing an EXISTING article to fix exactly one issue: \"" + check.label + "\". Return the FULL corrected <article>...</article> HTML, not a diff, not an explanation." },
        { role: "user", content: "Here is the current article HTML:\n\n" + html + "\n\nFix only the issue described, keep everything else as close to original as possible." }
      ], { temperature: 0.4, maxTokens: 3500 });
      const cleaned = fixed.trim().replace(/^```html/, "").replace(/^```/, "").replace(/```$/, "").trim();
      document.getElementById("article-html").value = cleaned;
      runAudit();
      toast("Fixed: " + check.label, "success");
    } catch(e) {
      toast("Fix failed: " + e.message, "error");
    }
  }

  document.getElementById("auto-optimize-btn").addEventListener("click", async () => {
    runAudit();
    const failing = lastAuditResults.filter(r => !r.pass);
    if (failing.length === 0) { toast("Already passing everything.", "success"); return; }
    const btn = document.getElementById("auto-optimize-btn");
    btn.disabled = true;
    try {
      for (const f of failing) {
        await fixIssue(f.id);
      }
      toast("Auto-optimize pass complete.", "success");
    } finally {
      btn.disabled = false;
    }
  });

  /* ---------- GITHUB HELPERS ---------- */
  async function ghRequest(path, opts){
    opts = opts || {};
    if (!settings.ghToken) throw new Error("No GitHub token configured.");
    const repo = settings.repo || "vaswinraaju-png/vortex_labs";
    const res = await fetch("https://api.github.com/repos/" + repo + path, {
      method: opts.method || "GET",
      headers: {
        "Authorization": "Bearer " + settings.ghToken,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
    if (!res.ok && res.status !== 404) {
      const errBody = await res.text();
      throw new Error("GitHub API " + res.status + ": " + errBody.slice(0,200));
    }
    if (res.status === 404) return null;
    return res.json();
  }

  function b64encode(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64decode(str){
    return decodeURIComponent(escape(atob(str)));
  }

  async function putFile(filePath, content, message){
    const branch = settings.branch || "main";
    const existing = await ghRequest("/contents/" + filePath + "?ref=" + branch);
    const body = {
      message: message,
      content: b64encode(content),
      branch: branch
    };
    if (existing && existing.sha) body.sha = existing.sha;
    return ghRequest("/contents/" + filePath, { method: "PUT", body: body });
  }

  async function getFile(filePath){
    const branch = settings.branch || "main";
    const data = await ghRequest("/contents/" + filePath + "?ref=" + branch);
    if (!data) return null;
    return { content: b64decode(data.content), sha: data.sha };
  }

  function logPublish(msg, isError){
    const log = document.getElementById("publish-log");
    const line = document.createElement("div");
    line.style.color = isError ? "var(--red)" : "var(--text-dim)";
    line.textContent = (isError ? "✕ " : "→ ") + msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  /* ---------- PUBLISH ---------- */
  async function publishNow(){
    const html = document.getElementById("article-html").value.trim();
    const filename = document.getElementById("publish-filename").value.trim();
    const pathPrefix = document.getElementById("publish-path").value.trim() || "blogs/";
    const topic = document.getElementById("current-topic").value.trim() || filename;

    if (!html) { toast("No article content to publish.", "error"); return; }
    if (!filename) { toast("Set a filename first.", "error"); return; }
    if (!settings.ghToken) { toast("Add your GitHub token in Settings first.", "error"); return; }

    const fullPath = pathPrefix.replace(/\/$/, "") + "/" + filename;
    const btn = document.getElementById("publish-now-btn");
    btn.disabled = true;
    document.getElementById("publish-log").innerHTML = "";

    try {
      logPublish("Wrapping article in site template…");
      const fullHtml = wrapInSiteTemplate(html, topic);

      logPublish("Committing " + fullPath + "…");
      await putFile(fullPath, fullHtml, "Add blog post: " + topic);
      logPublish("Committed " + fullPath, false);

      if (document.getElementById("rebuild-sitemap").checked) {
        logPublish("Rebuilding sitemap.xml…");
        await rebuildSitemap(fullPath);
        logPublish("sitemap.xml updated.");
      }

      if (document.getElementById("rebuild-index").checked) {
        logPublish("Adding card to index.html…");
        await rebuildIndex(fullPath, topic);
        logPublish("index.html updated.");
      }

      const hist = loadHistory();
      hist.unshift({ title: topic, path: fullPath, date: new Date().toISOString() });
      saveHistory(hist);
      renderHistory();

      toast("Published: " + fullPath, "success");
      logPublish("Done. Live shortly after your host redeploys.", false);
    } catch(e) {
      logPublish(e.message, true);
      toast("Publish failed: " + e.message, "error");
    } finally {
      btn.disabled = false;
    }
  }
  document.getElementById("publish-now-btn").addEventListener("click", publishNow);

  function wrapInSiteTemplate(articleHtml, title){
    const domain = settings.domain || "vortexlabs.app";
    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${escapeHtml(title)} | Vortex Labs</title>
<meta name="description" content="${escapeHtml(title)} — a beginner-friendly guide from Vortex Labs." />
<script src="https://cdn.tailwindcss.com"><\/script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#14171A; --bg-soft:#1D2125; --text:#F2EFE9; --text-dim:#B8B5AE; --line:#2D3137; --green:#2E8B57; --gold:#C9A24B; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin:0; line-height:1.7; }
  .post-body { max-width: 720px; margin: 0 auto; padding: 4rem 1.5rem; }
  .post-body h1 { font-family:'Lora',serif; font-size: 2.25rem; margin-bottom: 1rem; }
  .post-body h2 { font-family:'Lora',serif; font-size: 1.5rem; margin-top: 2.5rem; margin-bottom: .75rem; }
  .post-body p { color: var(--text-dim); margin-bottom: 1rem; }
  .post-body a { color: var(--gold); text-decoration: underline; }
  .post-body .callout { background: var(--bg-soft); border: 1px solid var(--line); border-left: 3px solid var(--green); padding: 1rem 1.25rem; border-radius: .5rem; margin: 2rem 0; }
  .post-body .cta-line { font-weight: 600; color: var(--text); }
  .post-body details { border: 1px solid var(--line); border-radius: .5rem; padding: .75rem 1rem; margin-bottom: .75rem; }
  .post-body summary { cursor: pointer; font-weight: 600; }
  .post-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
  .post-body th, .post-body td { border: 1px solid var(--line); padding: .5rem .75rem; text-align: left; }
</style>
</head>
<body>
<div class="post-body">
${articleHtml}
</div>
</body>
</html>`;
  }

  function escapeHtml(str){
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function rebuildSitemap(newPath){
    const domain = settings.domain || "vortexlabs.app";
    const file = await getFile("sitemap.xml");
    const url = "https://" + domain + "/" + newPath;
    const today = new Date().toISOString().slice(0,10);
    let content = file ? file.content : `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n</urlset>`;
    if (content.includes(url)) return;
    const entry = `  <url>\n    <loc>${url}</loc>\n    <lastmod>${today}</lastmod>\n  </url>\n`;
    content = content.replace("</urlset>", entry + "</urlset>");
    await putFile("sitemap.xml", content, "Update sitemap.xml for " + newPath);
  }

  async function rebuildIndex(newPath, title){
    const domain = settings.domain || "vortexlabs.app";
    const file = await getFile("index.html");
    if (!file) { logPublish("index.html not found, skipping card injection.", true); return; }
    let content = file.content;
    const cardHtml = `\n<!-- blog-card:${newPath} -->\n<a href="/${newPath}" class="blog-card">${escapeHtml(title)}</a>\n<!-- /blog-card -->\n`;
    const marker = "<!-- BLOG_CARDS_END -->";
    if (content.includes(marker)) {
      content = content.replace(marker, cardHtml + marker);
    } else {
      logPublish("No <!-- BLOG_CARDS_END --> marker found in index.html. Add one where you want new cards inserted, then re-run. Skipping index update for now.", true);
      return;
    }
    await putFile("index.html", content, "Add blog card for " + newPath);
  }

  /* ---------- SCHEDULING (client-side, fires while tab is open) ---------- */
  function loadScheduled(){
    try { return JSON.parse(localStorage.getItem(SCHED_KEY)) || []; } catch(e){ return []; }
  }
  function saveScheduled(s){ localStorage.setItem(SCHED_KEY, JSON.stringify(s)); }

  document.getElementById("schedule-btn").addEventListener("click", () => {
    const time = document.getElementById("schedule-time").value;
    if (!time) { toast("Pick a date/time first.", "error"); return; }
    const html = document.getElementById("article-html").value.trim();
    const filename = document.getElementById("publish-filename").value.trim();
    if (!html || !filename) { toast("Generate an article and set a filename first.", "error"); return; }
    const job = {
      id: Date.now(),
      time: time,
      filename: filename,
      pathPrefix: document.getElementById("publish-path").value.trim() || "blogs/",
      html: html,
      title: document.getElementById("current-topic").value.trim() || filename
    };
    const jobs = loadScheduled();
    jobs.push(job);
    saveScheduled(jobs);
    toast("Scheduled for " + new Date(time).toLocaleString(), "success");
  });

  setInterval(async () => {
    const jobs = loadScheduled();
    const now = Date.now();
    const due = jobs.filter(j => new Date(j.time).getTime() <= now);
    if (due.length === 0) return;
    for (const job of due) {
      try {
        const fullPath = job.pathPrefix.replace(/\/$/, "") + "/" + job.filename;
        const fullHtml = wrapInSiteTemplate(job.html, job.title);
        await putFile(fullPath, fullHtml, "Scheduled post: " + job.title);
        toast("Scheduled post published: " + fullPath, "success");
        const hist = loadHistory();
        hist.unshift({ title: job.title, path: fullPath, date: new Date().toISOString() });
        saveHistory(hist);
        renderHistory();
      } catch(e) {
        toast("Scheduled publish failed: " + e.message, "error");
      }
    }
    saveScheduled(jobs.filter(j => new Date(j.time).getTime() > now));
  }, 30000);

  /* ---------- HISTORY ---------- */
  function renderHistory(){
    const list = document.getElementById("history-list");
    const hist = loadHistory();
    list.innerHTML = "";
    if (hist.length === 0) {
      list.innerHTML = '<p style="color: var(--text-dim);">No posts published yet.</p>';
      return;
    }
    hist.forEach(h => {
      const row = document.createElement("div");
      row.className = "p-2 rounded";
      row.style.border = "1px solid var(--line)";
      row.innerHTML = `<div class="font-medium">${h.title}</div><div class="font-mono" style="color: var(--text-dim);">${h.path}</div><div class="font-mono" style="color: var(--text-dim);">${new Date(h.date).toLocaleString()}</div>`;
      list.appendChild(row);
    });
  }
  renderHistory();

  /* ---------- SETTINGS MODAL ---------- */
  function openSettings(){
    document.getElementById("set-openai-key").value = settings.openaiKey || "";
    document.getElementById("set-gh-token").value = settings.ghToken || "";
    document.getElementById("set-repo").value = settings.repo || "vaswinraaju-png/vortex_labs";
    document.getElementById("set-branch").value = settings.branch || "main";
    document.getElementById("set-domain").value = settings.domain || "vortexlabs.app";
    document.getElementById("set-cta-url").value = settings.ctaUrl || "/stock-market-guide.html";
    document.getElementById("set-product-name").value = settings.productName || "The ₹1 Lakh Trader Blueprint";
    document.getElementById("settings-modal").classList.remove("hidden");
  }
  document.getElementById("open-settings").addEventListener("click", openSettings);
  document.getElementById("settings-cancel").addEventListener("click", () => {
    document.getElementById("settings-modal").classList.add("hidden");
  });
  document.getElementById("settings-save").addEventListener("click", () => {
    settings = {
      openaiKey: document.getElementById("set-openai-key").value.trim(),
      ghToken: document.getElementById("set-gh-token").value.trim(),
      repo: document.getElementById("set-repo").value.trim(),
      branch: document.getElementById("set-branch").value.trim(),
      domain: document.getElementById("set-domain").value.trim(),
      ctaUrl: document.getElementById("set-cta-url").value.trim(),
      productName: document.getElementById("set-product-name").value.trim()
    };
    saveSettings(settings);
    document.getElementById("repo-pill").textContent = settings.repo;
    updateStatusPill();
    document.getElementById("settings-modal").classList.add("hidden");
    toast("Settings saved.", "success");
  });

  function updateStatusPill(){
    const pill = document.getElementById("status-pill");
    if (settings.openaiKey && settings.ghToken) {
      pill.textContent = "Ready";
      pill.style.color = "var(--green-bright)";
      pill.style.borderColor = "var(--green-bright)";
    } else {
      pill.textContent = "Not configured";
      pill.style.color = "var(--text-dim)";
      pill.style.borderColor = "var(--line)";
    }
  }

  /* ---------- INIT ---------- */
  document.getElementById("repo-pill").textContent = settings.repo || "vaswinraaju-png/vortex_labs";
  updateStatusPill();
  if (!settings.openaiKey || !settings.ghToken) {
    setTimeout(openSettings, 300);
  }

})();
</script>
</body>
</html>
